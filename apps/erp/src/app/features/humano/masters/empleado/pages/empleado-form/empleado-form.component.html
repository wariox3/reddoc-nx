@let f = t().entities.empleado.form;

<lib-breadcrumb [items]="breadcrumbItems()" />

<form [formGroup]="form" (ngSubmit)="onSubmit()" autocomplete="off" class="flex flex-col gap-5">
  <!-- ── Encabezado de página ──────────────────────────────────────────────── -->
  <header class="flex items-center gap-2">
    <p-button
      type="button"
      [label]="t().common.actions.back"
      icon="pi pi-arrow-left"
      severity="secondary"
      [outlined]="true"
      size="small"
      (onClick)="onCancel()"
    />
    <p-button
      type="submit"
      [label]="t().common.actions.save"
      size="small"
      icon="pi pi-check"
      [loading]="isSaving()"
      [disabled]="form.invalid || form.pending || isSaving()"
    />
  </header>

  <!-- ── Sección 1: Identidad y contacto ───────────────────────────────────── -->
  <section class="overflow-hidden rounded-xl border border-[rgba(20,48,73,0.1)] bg-brand-surface">
    <div class="flex items-center gap-3 border-b border-[rgba(20,48,73,0.08)] px-5 py-4">
      <span
        class="flex h-10 w-10 shrink-0 items-center justify-center rounded-[10px] bg-sky-50 text-sky-700"
      >
        <i class="pi pi-id-card text-[1.05rem]"></i>
      </span>
      <div class="flex min-w-0 flex-1 flex-col gap-[0.1rem]">
        <h2 class="m-0 text-[0.95rem] font-bold tracking-tight text-brand-text">
          {{ isEditMode() ? f.editTitle : f.createTitle }}
        </h2>
        <p class="m-0 text-[0.75rem] text-brand-muted">
          {{ isEditMode() ? f.editSubtitle : f.createSubtitle }}
        </p>
      </div>
    </div>

    <div class="px-5 py-5 max-[576px]:px-4 max-[576px]:py-4">
      <div class="grid grid-cols-1 gap-x-5 gap-y-4 sm:grid-cols-2">
        <!-- Tipo de identificación -->
        <div class="flex flex-col gap-1.5">
          <label for="identificacion" class="empleado-form__label">
            {{ f.fields.identificacion }}<span class="ml-px text-red-500">*</span>
          </label>
          <app-api-select
            inputId="identificacion"
            formControlName="identificacion"
            endpoint="/general/identificacion/seleccionar/"
            [params]="identificacionParams"
            [suggestedIndex]="isEditMode() ? null : 0"
            [invalid]="form.controls.identificacion.invalid && form.controls.identificacion.touched"
          />
          <lib-field-error
            [control]="form.controls.identificacion"
            [messages]="{ required: f.validation.required }"
          />
        </div>

        <!-- Número de identificación -->
        <div class="flex flex-col gap-1.5">
          <label for="numero_identificacion" class="empleado-form__label">
            {{ f.fields.numeroIdentificacion }}<span class="ml-px text-red-500">*</span>
          </label>
          <input
            id="numero_identificacion"
            pInputText
            type="text"
            formControlName="numero_identificacion"
            fluid
          />
          <lib-field-error
            [control]="form.controls.numero_identificacion"
            [messages]="{
              required: f.validation.required,
              numeroIdentificacionExistente: f.validation.numeroIdentificacionExistente,
            }"
          />
        </div>

        <!-- Primer nombre -->
        <div class="flex flex-col gap-1.5">
          <label for="nombre1" class="empleado-form__label">
            {{ f.fields.nombre1 }}<span class="ml-px text-red-500">*</span>
          </label>
          <input id="nombre1" pInputText type="text" formControlName="nombre1" fluid />
          <lib-field-error
            [control]="form.controls.nombre1"
            [messages]="{ required: f.validation.required }"
          />
        </div>

        <!-- Segundo nombre -->
        <div class="flex flex-col gap-1.5">
          <label for="nombre2" class="empleado-form__label">
            {{ f.fields.nombre2 }}
          </label>
          <input id="nombre2" pInputText type="text" formControlName="nombre2" fluid />
        </div>

        <!-- Primer apellido -->
        <div class="flex flex-col gap-1.5">
          <label for="apellido1" class="empleado-form__label">
            {{ f.fields.apellido1 }}<span class="ml-px text-red-500">*</span>
          </label>
          <input id="apellido1" pInputText type="text" formControlName="apellido1" fluid />
          <lib-field-error
            [control]="form.controls.apellido1"
            [messages]="{ required: f.validation.required }"
          />
        </div>

        <!-- Segundo apellido -->
        <div class="flex flex-col gap-1.5">
          <label for="apellido2" class="empleado-form__label">
            {{ f.fields.apellido2 }}
          </label>
          <input id="apellido2" pInputText type="text" formControlName="apellido2" fluid />
        </div>

        <!-- Teléfono -->
        <div class="flex flex-col gap-1.5">
          <label for="telefono" class="empleado-form__label">
            {{ f.fields.telefono }}<span class="ml-px text-red-500">*</span>
          </label>
          <input id="telefono" pInputText type="tel" formControlName="telefono" fluid />
          <lib-field-error
            [control]="form.controls.telefono"
            [messages]="{ required: f.validation.required }"
          />
        </div>

        <!-- Celular -->
        <div class="flex flex-col gap-1.5">
          <label for="celular" class="empleado-form__label">
            {{ f.fields.celular }}<span class="ml-px text-red-500">*</span>
          </label>
          <input id="celular" pInputText type="tel" formControlName="celular" fluid />
          <lib-field-error
            [control]="form.controls.celular"
            [messages]="{ required: f.validation.required }"
          />
        </div>

        <!-- Ciudad -->
        <div class="flex flex-col gap-1.5">
          <label for="ciudad" class="empleado-form__label">
            {{ f.fields.ciudad }}<span class="ml-px text-red-500">*</span>
          </label>
          <app-api-autocomplete
            inputId="ciudad"
            formControlName="ciudad"
            endpoint="/general/ciudad/seleccionar/"
            [placeholder]="f.fields.ciudadPlaceholder"
            [invalid]="form.controls.ciudad.invalid && form.controls.ciudad.touched"
          />
          <lib-field-error
            [control]="form.controls.ciudad"
            [messages]="{ required: f.validation.required }"
          />
        </div>

        <!-- Dirección -->
        <div class="flex flex-col gap-1.5">
          <label for="direccion" class="empleado-form__label">
            {{ f.fields.direccion }}<span class="ml-px text-red-500">*</span>
          </label>
          <input id="direccion" pInputText type="text" formControlName="direccion" fluid />
          <lib-field-error
            [control]="form.controls.direccion"
            [messages]="{ required: f.validation.required }"
          />
        </div>

        <!-- Barrio -->
        <div class="flex flex-col gap-1.5">
          <label for="barrio" class="empleado-form__label">
            {{ f.fields.barrio }}
          </label>
          <input id="barrio" pInputText type="text" formControlName="barrio" fluid />
        </div>

        <!-- Correo -->
        <div class="flex flex-col gap-1.5 sm:col-span-2">
          <label for="correo" class="empleado-form__label">
            {{ f.fields.correo }}<span class="ml-px text-red-500">*</span>
          </label>
          <input id="correo" pInputText type="email" formControlName="correo" fluid />
          <lib-field-error
            [control]="form.controls.correo"
            [messages]="{ required: f.validation.required, email: f.validation.emailInvalid }"
          />
        </div>
      </div>
    </div>
  </section>

  <!-- ── Sección 2: Datos bancarios (nómina) ───────────────────────────────── -->
  <section class="overflow-hidden rounded-xl border border-[rgba(20,48,73,0.1)] bg-brand-surface">
    <div class="flex items-center gap-3 border-b border-[rgba(20,48,73,0.08)] px-5 py-4">
      <span
        class="flex h-10 w-10 shrink-0 items-center justify-center rounded-[10px] bg-emerald-50 text-emerald-700"
      >
        <i class="pi pi-wallet text-[1.05rem]"></i>
      </span>
      <div class="flex min-w-0 flex-1 flex-col gap-[0.1rem]">
        <h2 class="m-0 text-[0.95rem] font-bold tracking-tight text-brand-text">
          {{ f.sections.banca }}
        </h2>
        <p class="m-0 text-[0.75rem] text-brand-muted">{{ f.sectionsHint.banca }}</p>
      </div>
    </div>

    <div class="px-5 py-5 max-[576px]:px-4 max-[576px]:py-4">
      <div class="grid grid-cols-1 gap-x-5 gap-y-4 sm:grid-cols-2">
        <!-- Banco -->
        <div class="flex flex-col gap-1.5">
          <label for="banco" class="empleado-form__label">
            {{ f.fields.banco }}<span class="ml-px text-red-500">*</span>
          </label>
          <app-api-autocomplete
            inputId="banco"
            formControlName="banco"
            endpoint="/general/banco/seleccionar/"
            [placeholder]="f.fields.bancoPlaceholder"
            [invalid]="form.controls.banco.invalid && form.controls.banco.touched"
          />
          <lib-field-error
            [control]="form.controls.banco"
            [messages]="{ required: f.validation.required }"
          />
        </div>

        <!-- Número de cuenta -->
        <div class="flex flex-col gap-1.5">
          <label for="numero_cuenta" class="empleado-form__label">
            {{ f.fields.numeroCuenta }}<span class="ml-px text-red-500">*</span>
          </label>
          <input id="numero_cuenta" pInputText type="text" formControlName="numero_cuenta" fluid />
          <lib-field-error
            [control]="form.controls.numero_cuenta"
            [messages]="{ required: f.validation.required }"
          />
        </div>

        <!-- Clase de cuenta -->
        <div class="flex flex-col gap-1.5">
          <label for="cuenta_banco_clase" class="empleado-form__label">
            {{ f.fields.cuentaBancoClase }}<span class="ml-px text-red-500">*</span>
          </label>
          <app-api-select
            inputId="cuenta_banco_clase"
            formControlName="cuenta_banco_clase"
            endpoint="/general/cuenta-banco-clase/seleccionar/"
            [invalid]="
              form.controls.cuenta_banco_clase.invalid && form.controls.cuenta_banco_clase.touched
            "
          />
          <lib-field-error
            [control]="form.controls.cuenta_banco_clase"
            [messages]="{ required: f.validation.required }"
          />
        </div>
      </div>
    </div>
  </section>
</form>
