<lib-breadcrumb [items]="breadcrumbItems()" />

<!-- ── Encabezado de página ──────────────────────────────────────────────────── -->
<header class="flex items-center gap-2">
  <p-button
    type="button"
    [label]="t().common.actions.back"
    icon="pi pi-arrow-left"
    severity="secondary"
    [outlined]="true"
    size="small"
    (onClick)="onBack()"
  />
  @if (sucursal(); as s) {
    <p-button
      type="button"
      [label]="t().common.actions.edit"
      icon="pi pi-pencil"
      size="small"
      (onClick)="onEdit()"
    />
  }
</header>

@if (isLoading()) {
  <div
    class="flex items-center justify-center rounded-xl border border-[rgba(20,48,73,0.1)] bg-brand-surface py-20 text-brand-muted"
  >
    <i class="pi pi-spin pi-spinner text-xl"></i>
  </div>
} @else if (notFound()) {
  <div
    class="flex flex-col items-center rounded-xl border border-[rgba(20,48,73,0.1)] bg-brand-surface px-6 py-16 text-center"
  >
    <i class="pi pi-inbox mb-3 text-2xl text-brand-muted opacity-50"></i>
    <p class="m-0 text-[0.95rem] font-bold text-brand-text">
      {{ t().entities.sucursal.detail.notFound.title }}
    </p>
    <p class="m-0 mt-1 max-w-70 text-[0.8rem] leading-relaxed text-brand-muted">
      {{ t().entities.sucursal.detail.notFound.desc }}
    </p>
  </div>
} @else if (sucursal(); as s) {
  <!-- ── Encabezado ───────────────────────────────────────────────────────────── -->
  <section class="overflow-hidden rounded-xl border border-[rgba(20,48,73,0.1)] bg-brand-surface">
    <div class="flex flex-wrap items-start gap-4 px-5 py-5 max-[576px]:px-4">
      <!-- Ícono -->
      <span
        class="flex h-14 w-14 shrink-0 items-center justify-center rounded-full bg-sky-50 text-sky-700"
      >
        <i class="pi pi-building text-[1.4rem]"></i>
      </span>

      <!-- Identidad -->
      <div class="flex min-w-0 flex-1 flex-col gap-2">
        <h1 class="m-0 truncate text-2xl font-bold tracking-tight text-brand-text">
          {{ s.nombre }}
        </h1>
        <p class="m-0 text-[0.8rem] font-medium text-brand-muted">
          {{ t().entities.sucursal.columns.codigo }}: {{ s.codigo }}
        </p>
      </div>
    </div>
  </section>
}
