<lib-breadcrumb [items]="breadcrumbItems()" />

<form [formGroup]="form" (ngSubmit)="onSubmit()" autocomplete="off" class="flex flex-col gap-5">
  <!-- ── Encabezado de página ──────────────────────────────────────────────── -->
  <header class="flex items-center gap-2">
    <p-button
      type="button"
      [label]="t().common.actions.back"
      icon="pi pi-arrow-left"
      severity="secondary"
      [outlined]="true"
      size="small"
      (onClick)="onCancel()"
    />
    <p-button
      type="submit"
      [label]="t().common.actions.save"
      size="small"
      icon="pi pi-check"
      [loading]="isSaving()"
      [disabled]="form.invalid || form.pending || isSaving()"
    />
  </header>
  <!-- ── Sección: Información principal ────────────────────────────────────── -->
  <section class="overflow-hidden rounded-xl border border-[rgba(20,48,73,0.1)] bg-brand-surface">
    <div class="flex items-center gap-3 border-b border-[rgba(20,48,73,0.08)] px-5 py-4">
      <span
        class="flex h-10 w-10 shrink-0 items-center justify-center rounded-[10px] bg-sky-50 text-sky-700"
      >
        <i class="pi pi-briefcase text-[1.05rem]"></i>
      </span>
      <div class="flex min-w-0 flex-1 flex-col gap-[0.1rem]">
        <h2 class="m-0 text-[0.95rem] font-bold tracking-tight text-brand-text">
          {{
            isEditMode() ? t().entities.cargo.form.editTitle : t().entities.cargo.form.createTitle
          }}
        </h2>
        <p class="m-0 text-[0.75rem] text-brand-muted">
          {{
            isEditMode()
              ? t().entities.cargo.form.editSubtitle
              : t().entities.cargo.form.createSubtitle
          }}
        </p>
      </div>
    </div>

    <div class="px-5 py-5 max-[576px]:px-4 max-[576px]:py-4">
      <div class="grid grid-cols-1 gap-x-5 gap-y-4 sm:grid-cols-2">
        <!-- Código -->
        <div class="flex flex-col gap-1.5">
          <label for="codigo" class="cargo-form__label">
            {{ t().entities.cargo.form.fields.codigo }}
            <span class="ml-px text-red-500">*</span>
          </label>
          <p-inputnumber
            inputId="codigo"
            formControlName="codigo"
            mode="decimal"
            [useGrouping]="false"
            [min]="0"
            [fluid]="true"
            [invalid]="form.controls.codigo.invalid && form.controls.codigo.touched"
          />
          <lib-field-error
            [control]="form.controls.codigo"
            [messages]="{ required: t().entities.cargo.form.validation.required }"
          />
        </div>

        <!-- Nombre -->
        <div class="flex flex-col gap-1.5">
          <label for="nombre" class="cargo-form__label">
            {{ t().entities.cargo.form.fields.nombre }}
            <span class="ml-px text-red-500">*</span>
          </label>
          <input id="nombre" pInputText type="text" formControlName="nombre" fluid />
          <lib-field-error
            [control]="form.controls.nombre"
            [messages]="{ required: t().entities.cargo.form.validation.required }"
          />
        </div>

        <!-- Estado inactivo -->
        <label
          for="estado_inactivo"
          class="flex cursor-pointer items-center gap-2 self-end pb-2 sm:col-span-2"
        >
          <p-checkbox inputId="estado_inactivo" formControlName="estado_inactivo" [binary]="true" />
          <span class="text-[0.85rem] text-brand-text">
            {{ t().entities.cargo.form.fields.estadoInactivo }}
          </span>
        </label>
      </div>
    </div>
  </section>
</form>
