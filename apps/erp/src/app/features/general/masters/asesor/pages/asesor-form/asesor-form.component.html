<lib-breadcrumb [items]="breadcrumbItems()" />

<form [formGroup]="form" (ngSubmit)="onSubmit()" autocomplete="off" class="flex flex-col gap-5">
  <!-- ── Encabezado de página ──────────────────────────────────────────────── -->
  <header class="flex items-center gap-2">
    <p-button
      type="button"
      [label]="t().common.actions.back"
      icon="pi pi-arrow-left"
      severity="secondary"
      [outlined]="true"
      size="small"
      (onClick)="onCancel()"
    />
    <p-button
      type="submit"
      [label]="t().common.actions.save"
      size="small"
      icon="pi pi-check"
      [loading]="isSaving()"
      [disabled]="form.invalid || form.pending || isSaving()"
    />
  </header>
  <!-- ── Sección: Información principal ────────────────────────────────────── -->
  <section class="overflow-hidden rounded-xl border border-[rgba(20,48,73,0.1)] bg-brand-surface">
    <div class="flex items-center gap-3 border-b border-[rgba(20,48,73,0.08)] px-5 py-4">
      <span
        class="flex h-10 w-10 shrink-0 items-center justify-center rounded-[10px] bg-sky-50 text-sky-700"
      >
        <i class="pi pi-user text-[1.05rem]"></i>
      </span>
      <div class="flex min-w-0 flex-1 flex-col gap-[0.1rem]">
        <h2 class="m-0 text-[0.95rem] font-bold tracking-tight text-brand-text">
          {{
            isEditMode() ? t().entities.asesor.form.editTitle : t().entities.asesor.form.createTitle
          }}
        </h2>
        <p class="m-0 text-[0.75rem] text-brand-muted">
          {{
            isEditMode()
              ? t().entities.asesor.form.editSubtitle
              : t().entities.asesor.form.createSubtitle
          }}
        </p>
      </div>
    </div>

    <div class="px-5 py-5 max-[576px]:px-4 max-[576px]:py-4">
      <div class="grid grid-cols-1 gap-x-5 gap-y-4 sm:grid-cols-2">
        <!-- Nombre corto -->
        <div class="flex flex-col gap-1.5">
          <label for="nombre_corto" class="asesor-form__label">
            {{ t().entities.asesor.form.fields.nombreCorto }}
            <span class="ml-px text-red-500">*</span>
          </label>
          <input id="nombre_corto" pInputText type="text" formControlName="nombre_corto" fluid />
          <lib-field-error
            [control]="form.controls.nombre_corto"
            [messages]="{ required: t().entities.asesor.form.validation.required }"
          />
        </div>

        <!-- Celular -->
        <div class="flex flex-col gap-1.5">
          <label for="celular" class="asesor-form__label">
            {{ t().entities.asesor.form.fields.celular }}
            <span class="ml-px text-red-500">*</span>
          </label>
          <input id="celular" pInputText type="text" formControlName="celular" fluid />
          <lib-field-error
            [control]="form.controls.celular"
            [messages]="{ required: t().entities.asesor.form.validation.required }"
          />
        </div>

        <!-- Correo -->
        <div class="flex flex-col gap-1.5 sm:col-span-2">
          <label for="correo" class="asesor-form__label">
            {{ t().entities.asesor.form.fields.correo }}
            <span class="ml-px text-red-500">*</span>
          </label>
          <input id="correo" pInputText type="email" formControlName="correo" fluid />
          <lib-field-error
            [control]="form.controls.correo"
            [messages]="{
              required: t().entities.asesor.form.validation.required,
              email: t().entities.asesor.form.validation.email,
            }"
          />
        </div>
      </div>
    </div>
  </section>
</form>
