<lib-breadcrumb [items]="breadcrumbItems()" />

<form [formGroup]="form" (ngSubmit)="onSubmit()" autocomplete="off" class="flex flex-col gap-5">
  <!-- ── Encabezado de página ──────────────────────────────────────────────── -->
  <header class="flex items-center gap-2">
    <p-button
      type="button"
      [label]="t().common.actions.back"
      icon="pi pi-arrow-left"
      severity="secondary"
      [outlined]="true"
      size="small"
      (onClick)="onCancel()"
    />
    <p-button
      type="submit"
      [label]="t().common.actions.save"
      size="small"
      icon="pi pi-check"
      [loading]="isSaving()"
      [disabled]="form.invalid || form.pending || isSaving()"
    />
  </header>

  <!-- ── Sección: Información principal ────────────────────────────────────── -->
  <section class="overflow-hidden rounded-xl border border-[rgba(20,48,73,0.1)] bg-brand-surface">
    <div class="flex items-center gap-3 border-b border-[rgba(20,48,73,0.08)] px-5 py-4">
      <span
        class="flex h-10 w-10 shrink-0 items-center justify-center rounded-[10px] bg-sky-50 text-sky-700"
      >
        <i class="pi pi-tag text-[1.05rem]"></i>
      </span>
      <div class="flex min-w-0 flex-1 flex-col gap-[0.1rem]">
        <h2 class="m-0 text-[0.95rem] font-bold tracking-tight text-brand-text">
          {{
            isEditMode() ? t().entities.precio.form.editTitle : t().entities.precio.form.createTitle
          }}
        </h2>
        <p class="m-0 text-[0.75rem] text-brand-muted">
          {{
            isEditMode()
              ? t().entities.precio.form.editSubtitle
              : t().entities.precio.form.createSubtitle
          }}
        </p>
      </div>
    </div>

    <div class="px-5 py-5 max-[576px]:px-4 max-[576px]:py-4">
      <div class="grid grid-cols-1 gap-x-5 gap-y-4 sm:grid-cols-2">
        <!-- Nombre -->
        <div class="flex flex-col gap-1.5 sm:col-span-2">
          <label for="nombre" class="precio-form__label">
            {{ t().entities.precio.form.fields.nombre }}
            <span class="ml-px text-red-500">*</span>
          </label>
          <input id="nombre" pInputText type="text" formControlName="nombre" fluid />
          <lib-field-error
            [control]="form.controls.nombre"
            [messages]="{ required: t().entities.precio.form.validation.required }"
          />
        </div>

        <!-- Fecha de vencimiento -->
        <div class="flex flex-col gap-1.5">
          <label for="fecha_vence" class="precio-form__label">
            {{ t().entities.precio.form.fields.fechaVence }}
          </label>
          <p-datepicker
            inputId="fecha_vence"
            formControlName="fecha_vence"
            dateFormat="yy-mm-dd"
            [showIcon]="true"
            appendTo="body"
            [fluid]="true"
          />
        </div>

        <!-- Flags venta / compra -->
        <div class="flex flex-col gap-3 sm:col-span-2">
          <label for="venta" class="flex cursor-pointer items-center gap-2">
            <p-checkbox inputId="venta" formControlName="venta" [binary]="true" />
            <span class="text-[0.85rem] text-brand-text">
              {{ t().entities.precio.form.fields.venta }}
            </span>
          </label>

          <label for="compra" class="flex cursor-pointer items-center gap-2">
            <p-checkbox inputId="compra" formControlName="compra" [binary]="true" />
            <span class="text-[0.85rem] text-brand-text">
              {{ t().entities.precio.form.fields.compra }}
            </span>
          </label>
        </div>
      </div>
    </div>
  </section>
</form>
