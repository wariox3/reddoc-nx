<lib-breadcrumb [items]="breadcrumbItems()" />

<form [formGroup]="form" (ngSubmit)="onSubmit()" autocomplete="off" class="flex flex-col gap-5">
  <!-- ── Encabezado de página ──────────────────────────────────────────────── -->
  <header class="flex items-center gap-2">
    <p-button
      type="button"
      [label]="t().common.actions.back"
      icon="pi pi-arrow-left"
      severity="secondary"
      [outlined]="true"
      size="small"
      (onClick)="onCancel()"
    />
    <p-button
      type="submit"
      [label]="t().common.actions.save"
      size="small"
      icon="pi pi-check"
      [loading]="isSaving()"
      [disabled]="form.invalid || form.pending || isSaving()"
    />
  </header>

  <!-- ── Sección: Información principal ────────────────────────────────────── -->
  <section class="overflow-hidden rounded-xl border border-[rgba(20,48,73,0.1)] bg-brand-surface">
    <div class="flex items-center gap-3 border-b border-[rgba(20,48,73,0.08)] px-5 py-4">
      <span
        class="flex h-10 w-10 shrink-0 items-center justify-center rounded-[10px] bg-sky-50 text-sky-700"
      >
        <i class="pi pi-clock text-[1.05rem]"></i>
      </span>
      <div class="flex min-w-0 flex-1 flex-col gap-[0.1rem]">
        <h2 class="m-0 text-[0.95rem] font-bold tracking-tight text-brand-text">
          {{
            isEditMode() ? t().entities.turno.form.editTitle : t().entities.turno.form.createTitle
          }}
        </h2>
        <p class="m-0 text-[0.75rem] text-brand-muted">
          {{
            isEditMode()
              ? t().entities.turno.form.editSubtitle
              : t().entities.turno.form.createSubtitle
          }}
        </p>
      </div>
    </div>

    <div class="px-5 py-5 max-[576px]:px-4 max-[576px]:py-4">
      <div class="grid grid-cols-1 gap-x-5 gap-y-4 sm:grid-cols-2">
        <!-- Código -->
        <div class="flex flex-col gap-1.5">
          <label for="codigo" class="turno-form__label">
            {{ t().entities.turno.form.fields.codigo }}
            <span class="ml-px text-red-500">*</span>
          </label>
          <input
            id="codigo"
            pInputText
            type="text"
            formControlName="codigo"
            appUppercase
            maxlength="10"
            fluid
          />
          <lib-field-error
            [control]="form.controls.codigo"
            [messages]="{ required: t().entities.turno.form.validation.required }"
          />
        </div>

        <!-- Nombre -->
        <div class="flex flex-col gap-1.5">
          <label for="nombre" class="turno-form__label">
            {{ t().entities.turno.form.fields.nombre }}
            <span class="ml-px text-red-500">*</span>
          </label>
          <input id="nombre" pInputText type="text" formControlName="nombre" fluid />
          <lib-field-error
            [control]="form.controls.nombre"
            [messages]="{ required: t().entities.turno.form.validation.required }"
          />
        </div>

        <!-- Hora inicio + Hora fin | Horas / diurnas / nocturnas -->
        <div class="grid grid-cols-2 gap-x-4">
          <div class="flex flex-col gap-1.5">
            <label for="hora_inicio" class="turno-form__label">
              {{ t().entities.turno.form.fields.horaInicio }}
            </label>
            <input id="hora_inicio" pInputText type="time" formControlName="hora_inicio" fluid />
            <lib-field-error [control]="form.controls.hora_inicio" />
          </div>
          <div class="flex flex-col gap-1.5">
            <label for="hora_fin" class="turno-form__label">
              {{ t().entities.turno.form.fields.horaFin }}
            </label>
            <input id="hora_fin" pInputText type="time" formControlName="hora_fin" fluid />
            <lib-field-error [control]="form.controls.hora_fin" />
          </div>
        </div>
        <div class="grid grid-cols-3 gap-x-3">
          <div class="flex flex-col gap-1.5">
            <label for="horas" class="turno-form__label">
              {{ t().entities.turno.form.fields.horas }}
            </label>
            <input id="horas" pInputText type="number" formControlName="horas" fluid />
            <lib-field-error [control]="form.controls.horas" />
          </div>
          <div class="flex flex-col gap-1.5">
            <label for="horas_diurnas" class="turno-form__label">
              {{ t().entities.turno.form.fields.horasDiurnas }}
            </label>
            <input
              id="horas_diurnas"
              pInputText
              type="number"
              formControlName="horas_diurnas"
              fluid
            />
            <lib-field-error [control]="form.controls.horas_diurnas" />
          </div>
          <div class="flex flex-col gap-1.5">
            <label for="horas_nocturnas" class="turno-form__label">
              {{ t().entities.turno.form.fields.horasNocturnas }}
            </label>
            <input
              id="horas_nocturnas"
              pInputText
              type="number"
              formControlName="horas_nocturnas"
              fluid
            />
            <lib-field-error [control]="form.controls.horas_nocturnas" />
          </div>
        </div>

        <!-- Tipo de novedad -->
        <div class="flex flex-col gap-1.5">
          <label for="novedad_tipo" class="turno-form__label">
            {{ t().entities.turno.form.fields.novedadTipo }}
          </label>
          <app-api-select
            inputId="novedad_tipo"
            formControlName="novedad_tipo"
            [endpoint]="novedadTipoEndpoint"
            [params]="tipoParams"
            [placeholder]="t().entities.turno.form.fields.novedadTipoPlaceholder"
          />
          <lib-field-error [control]="form.controls.novedad_tipo" />
        </div>

        <!-- Color -->
        <div class="flex flex-col gap-1.5">
          <label for="color" class="turno-form__label">
            {{ t().entities.turno.form.fields.color }}
          </label>
          <div class="flex items-center gap-3">
            <input
              id="color"
              type="color"
              formControlName="color"
              class="h-10 w-14 cursor-pointer rounded-md border border-[rgba(20,48,73,0.2)] bg-brand-surface p-1"
            />
            <span class="font-mono text-[0.85rem] text-brand-muted">{{
              form.controls.color.value
            }}</span>
          </div>
          <lib-field-error [control]="form.controls.color" />
        </div>

        <!-- Descanso + Inactivo -->
        <div class="flex items-center gap-5 self-end pb-2 sm:col-span-2">
          <label for="descanso" class="flex cursor-pointer items-center gap-2">
            <p-checkbox inputId="descanso" formControlName="descanso" [binary]="true" />
            <span class="text-[0.85rem] text-brand-text">
              {{ t().entities.turno.form.fields.descanso }}
            </span>
          </label>
          <label for="estado_inactivo" class="flex cursor-pointer items-center gap-2">
            <p-checkbox
              inputId="estado_inactivo"
              formControlName="estado_inactivo"
              [binary]="true"
            />
            <span class="text-[0.85rem] text-brand-text">
              {{ t().entities.turno.form.fields.estadoInactivo }}
            </span>
          </label>
        </div>
      </div>
    </div>
  </section>
</form>
