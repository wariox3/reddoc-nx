<lib-breadcrumb [items]="breadcrumbItems()" />

<form [formGroup]="form" (ngSubmit)="onSubmit()" autocomplete="off" class="flex flex-col gap-5">
  <!-- ── Encabezado de página ──────────────────────────────────────────────── -->
  <header class="flex items-center gap-2">
    <p-button
      type="button"
      [label]="t().common.actions.back"
      icon="pi pi-arrow-left"
      severity="secondary"
      [outlined]="true"
      size="small"
      (onClick)="onCancel()"
    />
    <p-button
      type="submit"
      [label]="t().common.actions.save"
      size="small"
      icon="pi pi-check"
      [loading]="isSaving()"
      [disabled]="form.invalid || form.pending || isSaving()"
    />
  </header>
  <!-- ── Sección: Información principal ────────────────────────────────────── -->
  <section class="overflow-hidden rounded-xl border border-[rgba(20,48,73,0.1)] bg-brand-surface">
    <div class="flex items-center gap-3 border-b border-[rgba(20,48,73,0.08)] px-5 py-4">
      <span
        class="flex h-10 w-10 shrink-0 items-center justify-center rounded-[10px] bg-sky-50 text-sky-700"
      >
        <i class="pi pi-map-marker text-[1.05rem]"></i>
      </span>
      <div class="flex min-w-0 flex-1 flex-col gap-[0.1rem]">
        <h2 class="m-0 text-[0.95rem] font-bold tracking-tight text-brand-text">
          {{
            isEditMode() ? t().entities.puesto.form.editTitle : t().entities.puesto.form.createTitle
          }}
        </h2>
        <p class="m-0 text-[0.75rem] text-brand-muted">
          {{
            isEditMode()
              ? t().entities.puesto.form.editSubtitle
              : t().entities.puesto.form.createSubtitle
          }}
        </p>
      </div>
    </div>

    <div class="px-5 py-5 max-[576px]:px-4 max-[576px]:py-4">
      <div class="grid grid-cols-1 gap-x-5 gap-y-4 sm:grid-cols-2">
        <!-- Contacto -->
        <div class="flex flex-col gap-1.5">
          <label for="contacto" class="puesto-form__label">
            {{ t().entities.puesto.form.fields.contacto }}
            <span class="ml-px text-red-500">*</span>
          </label>
          <app-contacto-select
            inputId="contacto"
            formControlName="contacto"
            [placeholder]="t().entities.puesto.form.fields.contactoPlaceholder"
            [invalid]="form.controls.contacto.invalid && form.controls.contacto.touched"
          />
          <lib-field-error
            [control]="form.controls.contacto"
            [messages]="{ required: t().entities.puesto.form.validation.required }"
          />
        </div>

        <!-- Nombre -->
        <div class="flex flex-col gap-1.5">
          <label for="nombre" class="puesto-form__label">
            {{ t().entities.puesto.form.fields.nombre }}
            <span class="ml-px text-red-500">*</span>
          </label>
          <input id="nombre" pInputText type="text" formControlName="nombre" fluid />
          <lib-field-error
            [control]="form.controls.nombre"
            [messages]="{ required: t().entities.puesto.form.validation.required }"
          />
        </div>

        <!-- Dirección -->
        <div class="flex flex-col gap-1.5">
          <label for="direccion" class="puesto-form__label">
            {{ t().entities.puesto.form.fields.direccion }}
            <span class="ml-px text-red-500">*</span>
          </label>
          <input id="direccion" pInputText type="text" formControlName="direccion" fluid />
          <lib-field-error
            [control]="form.controls.direccion"
            [messages]="{ required: t().entities.puesto.form.validation.required }"
          />
        </div>

        <!-- Ciudad -->
        <div class="flex flex-col gap-1.5">
          <label for="ciudad" class="puesto-form__label">
            {{ t().entities.puesto.form.fields.ciudad }}
            <span class="ml-px text-red-500">*</span>
          </label>
          <app-api-autocomplete
            inputId="ciudad"
            formControlName="ciudad"
            [endpoint]="endpoints.ciudad"
            [placeholder]="t().entities.puesto.form.fields.ciudadPlaceholder"
            [invalid]="form.controls.ciudad.invalid && form.controls.ciudad.touched"
          />
          <lib-field-error
            [control]="form.controls.ciudad"
            [messages]="{ required: t().entities.puesto.form.validation.required }"
          />
        </div>

        <!-- Centro de costo -->
        <div class="flex flex-col gap-1.5">
          <label for="centroCosto" class="puesto-form__label">
            {{ t().entities.puesto.form.fields.centroCosto }}
            <span class="ml-px text-red-500">*</span>
          </label>
          <app-api-autocomplete
            inputId="centroCosto"
            formControlName="centroCosto"
            [endpoint]="endpoints.centroCosto"
            [placeholder]="t().entities.puesto.form.fields.centroCostoPlaceholder"
            [invalid]="form.controls.centroCosto.invalid && form.controls.centroCosto.touched"
          />
          <lib-field-error
            [control]="form.controls.centroCosto"
            [messages]="{ required: t().entities.puesto.form.validation.required }"
          />
        </div>

        <!-- Programador -->
        <div class="flex flex-col gap-1.5">
          <label for="programador" class="puesto-form__label">
            {{ t().entities.puesto.form.fields.programador }}
            <span class="ml-px text-red-500">*</span>
          </label>
          <app-api-autocomplete
            inputId="programador"
            formControlName="programador"
            endpoint="/turno/programador/seleccionar/"
            [placeholder]="t().entities.puesto.form.fields.programadorPlaceholder"
            [invalid]="form.controls.programador.invalid && form.controls.programador.touched"
          />
          <lib-field-error
            [control]="form.controls.programador"
            [messages]="{ required: t().entities.puesto.form.validation.required }"
          />
        </div>

        <!-- Celular -->
        <div class="flex flex-col gap-1.5">
          <label for="celular" class="puesto-form__label">
            {{ t().entities.puesto.form.fields.celular }}
          </label>
          <input id="celular" pInputText type="tel" formControlName="celular" fluid />
        </div>

        <!-- Latitud + Longitud (mitad derecha, juntas) -->
        <div class="grid grid-cols-2 gap-x-4">
          <div class="flex flex-col gap-1.5">
            <label for="latitud" class="puesto-form__label">
              {{ t().entities.puesto.form.fields.latitud }}
            </label>
            <input id="latitud" pInputText type="text" formControlName="latitud" fluid />
          </div>
          <div class="flex flex-col gap-1.5">
            <label for="longitud" class="puesto-form__label">
              {{ t().entities.puesto.form.fields.longitud }}
            </label>
            <input id="longitud" pInputText type="text" formControlName="longitud" fluid />
          </div>
        </div>

        <!-- Comentario -->
        <div class="flex flex-col gap-1.5 sm:col-span-2">
          <label for="comentario" class="puesto-form__label">
            {{ t().entities.puesto.form.fields.comentario }}
          </label>
          <textarea
            id="comentario"
            pTextarea
            formControlName="comentario"
            rows="3"
            class="w-full"
          ></textarea>
        </div>
      </div>
    </div>
  </section>
</form>
