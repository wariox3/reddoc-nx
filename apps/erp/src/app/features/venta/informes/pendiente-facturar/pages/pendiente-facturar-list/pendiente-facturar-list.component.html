<lib-list-shell [breadcrumb]="breadcrumbItems()" [title]="t().entities.pendienteFacturar.name">
  <lib-data-toolbar
    toolbar
    [trailingActions]="trailingActions"
    [searchEnabled]="false"
    [filtersEnabled]="true"
    [activeFiltersCount]="activeFilters().length"
    (actionInvoked)="onToolbarAction($event)"
    (filtersToggle)="openFilters()"
    (filtersClear)="clearFilters()"
  />

  <lib-data-table
    table
    [columns]="columns"
    [items]="items()"
    [totalCount]="totalCount()"
    [loading]="isLoading()"
    [pageSize]="pageSize()"
    [currentPage]="currentPage()"
    [sort]="sort()"
    (pageChange)="onPageChange($event)"
    (sortChange)="onSortChange($event)"
  />
</lib-list-shell>

<lib-data-filter-modal
  [fields]="filterFields"
  [value]="activeFilters()"
  [visible]="filtersVisible()"
  (visibleChange)="filtersVisible.set($event)"
  (apply)="onFiltersApply($event)"
/>
