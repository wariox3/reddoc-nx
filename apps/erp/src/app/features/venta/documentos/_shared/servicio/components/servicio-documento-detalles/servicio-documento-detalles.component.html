@let d = t().entities.servicioDocumento.form.detalles;

<div class="flex flex-col gap-4">
  <div class="flex flex-wrap items-center gap-x-3 gap-y-1">
    @if (!contactoId()) {
      <span class="inline-flex items-center gap-1.5 text-[0.76rem] text-brand-muted">
        <i class="pi pi-info-circle text-[0.72rem]"></i>
        {{ d.contactoRequired }}
      </span>
    } @else if (!sectorId()) {
      <span class="inline-flex items-center gap-1.5 text-[0.76rem] text-brand-muted">
        <i class="pi pi-info-circle text-[0.72rem]"></i>
        {{ d.sectorRequired }}
      </span>
    } @else if (estrato() === null) {
      <span class="inline-flex items-center gap-1.5 text-[0.76rem] text-brand-muted">
        <i class="pi pi-info-circle text-[0.72rem]"></i>
        {{ d.estratoRequired }}
      </span>
    } @else if (salario() === null) {
      <span class="inline-flex items-center gap-1.5 text-[0.76rem] text-brand-muted">
        <i class="pi pi-info-circle text-[0.72rem]"></i>
        {{ d.salarioRequired }}
      </span>
    }
    <p-button
      type="button"
      class="ml-auto"
      [label]="d.addLine"
      icon="pi pi-plus"
      [outlined]="true"
      size="small"
      [disabled]="!sectorId() || !contactoId() || estrato() === null || salario() === null"
      (onClick)="openCreate()"
    />
  </div>

  <app-servicio-documento-lineas-table
    [lines]="lines()"
    [showActions]="true"
    (edit)="openEdit($event)"
    (remove)="removeLinea($event)"
  />

  @if (lines().length > 0) {
    <app-servicio-documento-resumen [resumen]="resumen()" />
  }
</div>

<app-servicio-documento-detalle-modal
  [(visible)]="modalVisible"
  [value]="modalValue()"
  [sectorId]="sectorId()"
  [contactoId]="contactoId()"
  [lockedPuesto]="lockedPuesto()"
  [salario]="salario()"
  [saving]="savingLine()"
  (save)="onModalSave($event)"
/>

<p-confirmDialog />
