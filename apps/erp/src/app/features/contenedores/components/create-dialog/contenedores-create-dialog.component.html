<p-dialog
  [visible]="visible()"
  (visibleChange)="visibleChange.emit($event)"
  [modal]="true"
  [draggable]="false"
  [resizable]="false"
  [closable]="true"
  [style]="{ width: '520px' }"
  styleClass="cp-create-dialog"
>
  <!-- Header -->
  <ng-template pTemplate="header">
    <div class="flex items-center gap-3.5">
      <span
        class="flex h-10 w-10 shrink-0 items-center justify-center rounded-[10px] bg-brand-blue/15"
      >
        <i class="pi pi-building text-[1.1rem] text-brand-blue"></i>
      </span>
      <div class="flex flex-col gap-[0.1rem]">
        <h2
          class="m-0 text-[1.05rem] font-extrabold leading-tight tracking-[-0.03em] text-brand-navy"
        >
          {{ isEditMode() ? t().contenedores.edit.title : t().contenedores.create.title }}
        </h2>
        <p class="m-0 text-[0.75rem] tracking-[0.01em] text-brand-muted">
          {{ isEditMode() ? t().contenedores.edit.subtitle : t().contenedores.create.subtitle }}
        </p>
      </div>
    </div>
  </ng-template>

  <!-- Body -->
  @if (visible()) {
    <app-contenedor-create-form
      [contenedor]="contenedor()"
      (created)="onCreated()"
      (updated)="onUpdated()"
      (cancelled)="onCancel()"
      (creationOverlay)="creationOverlayNombre.set($event)"
    />
  }
</p-dialog>

@if (creationOverlayNombre() !== null) {
  <app-contenedor-creation-overlay [nombreEmpresa]="creationOverlayNombre()!" />
}
