<form
  [formGroup]="form"
  (ngSubmit)="onSubmit()"
  class="flex flex-col gap-[1.1rem]"
  autocomplete="off"
>
  <!-- Nombre -->
  <div class="flex flex-col">
    <label
      for="nombre"
      class="mb-1.5 flex items-center gap-2 text-[0.78rem] font-semibold tracking-[-0.01em] text-brand-navy"
    >
      {{ t().contenedores.create.fields.name }}
    </label>
    <input
      id="nombre"
      pInputText
      type="text"
      formControlName="nombre"
      [placeholder]="t().contenedores.create.fields.namePlaceholder"
      class="w-full"
      [class.cd-input-error]="
        form.controls.nombre.invalid && (form.controls.nombre.touched || form.controls.nombre.dirty)
      "
    />
    <lib-field-error
      [control]="form.controls.nombre"
      [messages]="{
        required: t().contenedores.create.validation.nameRequired,
        minlength: t().contenedores.create.validation.nameMin2,
      }"
    />
  </div>

  <!-- Teléfono -->
  <div class="flex flex-col">
    <label
      for="telefono"
      class="mb-1.5 flex items-center gap-2 text-[0.78rem] font-semibold tracking-[-0.01em] text-brand-navy"
    >
      {{ t().contenedores.create.fields.phone }}
    </label>
    <input
      id="telefono"
      pInputText
      type="tel"
      formControlName="telefono"
      [placeholder]="t().contenedores.create.fields.phonePlaceholder"
      class="w-full"
      [class.cd-input-error]="
        form.controls.telefono.invalid &&
        (form.controls.telefono.touched || form.controls.telefono.dirty)
      "
    />
    <lib-field-error
      [control]="form.controls.telefono"
      [messages]="{
        required: t().contenedores.create.validation.phoneRequired,
        maxlength: t().contenedores.create.validation.phoneMax20,
      }"
    />
  </div>

  <!-- Correo -->
  <div class="flex flex-col">
    <label
      for="correo"
      class="mb-1.5 flex items-center gap-2 text-[0.78rem] font-semibold tracking-[-0.01em] text-brand-navy"
    >
      {{ t().contenedores.create.fields.email }}
    </label>
    <input
      id="correo"
      pInputText
      type="email"
      formControlName="correo"
      [placeholder]="t().contenedores.create.fields.emailPlaceholder"
      class="w-full"
      [class.cd-input-error]="
        form.controls.correo.invalid && (form.controls.correo.touched || form.controls.correo.dirty)
      "
    />
    <lib-field-error
      [control]="form.controls.correo"
      [messages]="{
        required: t().contenedores.create.validation.emailRequired,
        email: t().contenedores.create.validation.emailInvalid,
      }"
    />
  </div>

  <!-- Footer -->
  <div class="mt-1 flex items-center justify-end gap-3 border-t border-[rgba(20,48,73,0.08)] pt-5">
    <p-button
      [label]="isEditMode() ? t().contenedores.edit.cancel : t().contenedores.create.cancel"
      [outlined]="true"
      severity="secondary"
      (onClick)="onCancel()"
    />
    <p-button
      type="submit"
      [label]="isEditMode() ? t().contenedores.edit.submit : t().contenedores.create.submit"
      [loading]="isSaving()"
      [disabled]="form.invalid || isSaving()"
    />
  </div>
</form>
