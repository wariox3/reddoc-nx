<div class="cc-overlay">
  <p class="cc-overlay__empresa">{{ nombreEmpresa() }}</p>

  <div class="cc-overlay__icon-wrap">
    <span class="cc-pulse-ring cc-pulse-ring--1"></span>
    <span class="cc-pulse-ring cc-pulse-ring--2"></span>
    <div class="cc-overlay__icon-circle">
      <i class="pi {{ pasos[savingStep()].icon }}"></i>
    </div>
  </div>

  <div class="cc-overlay__steps">
    @for (paso of pasos; track paso.label; let i = $index) {
      @if (i < savingStep()) {
        <span class="cc-step cc-step--done">
          <i class="pi pi-check"></i>
          {{ paso.label }}
        </span>
      } @else if (i === savingStep()) {
        <span class="cc-step cc-step--active">
          <span class="cc-step-dot"></span>
          {{ paso.label }}
        </span>
      }
    }
  </div>

  <div class="cc-overlay__progress-track">
    <div class="cc-overlay__progress-bar"></div>
  </div>

  <p class="cc-overlay__hint">
    No cierres esta ventana — el proceso puede tardar hasta 30 segundos
  </p>
</div>
