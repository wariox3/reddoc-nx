<form (ngSubmit)="onSubmit()" class="flex flex-col gap-1.5">
  <label
    for="invite-email"
    class="text-[0.72rem] font-medium uppercase tracking-[0.08em] text-brand-muted"
  >
    {{ t().contenedores.invite.form.label }}
  </label>
  <div class="flex items-stretch gap-2">
    <p-autocomplete
      inputId="invite-email"
      [ngModel]="autocompleteValue()"
      (ngModelChange)="autocompleteValue.set($event)"
      [suggestions]="userSuggestions()"
      (completeMethod)="searchUsers($event)"
      (onSelect)="onUserSelected($event)"
      [optionLabel]="'email'"
      [forceSelection]="true"
      [minLength]="3"
      [delay]="300"
      appendTo="body"
      class="flex-1"
      inputStyleClass="w-full"
      [placeholder]="t().contenedores.invite.form.placeholder"
      autocomplete="off"
    >
      <ng-template pTemplate="item" let-user>
        <div class="flex items-center gap-2.5 py-0.5">
          <span
            class="flex h-7 w-7 shrink-0 items-center justify-center rounded-md bg-[rgba(20,48,73,0.06)] text-[0.65rem] font-bold text-brand-navy"
          >
            {{ userInitials(user) }}
          </span>
          <div class="flex flex-col leading-tight">
            <span class="text-[0.82rem] font-semibold text-brand-navy">{{
              user.nombre_corto ?? user.email
            }}</span>
            @if (user.nombre_corto) {
              <span class="text-[0.7rem] text-brand-muted">{{ user.email }}</span>
            }
          </div>
        </div>
      </ng-template>
    </p-autocomplete>
    <p-button
      type="submit"
      size="small"
      icon="pi pi-send"
      [label]="
        isSending() ? t().contenedores.invite.form.sending : t().contenedores.invite.form.submit
      "
      [loading]="isSending()"
      [disabled]="!selectedUser() || isSending()"
    />
  </div>
  @if (!selectedUser() && autocompleteValue()) {
    <span class="flex items-center gap-1.5 text-[0.7rem] tracking-[0.01em] text-red-600">
      <i class="pi pi-times-circle text-[0.7rem]"></i>
      {{ t().contenedores.invite.form.invalid }}
    </span>
  }
</form>
