<p-dialog
  [visible]="visible()"
  (visibleChange)="visibleChange.emit($event)"
  [modal]="true"
  [draggable]="false"
  [resizable]="false"
  [closable]="true"
  [style]="{ width: '460px' }"
  styleClass="cp-delete-dialog"
>
  <!-- Header -->
  <ng-template pTemplate="header">
    <div class="flex items-center gap-3.5">
      <span class="flex h-10 w-10 shrink-0 items-center justify-center rounded-[10px] bg-red-50">
        <i class="pi pi-trash text-[1.1rem] text-red-600"></i>
      </span>
      <div class="flex flex-col gap-[0.1rem]">
        <h2 class="m-0 text-[1.05rem] font-extrabold leading-tight tracking-[-0.03em] text-red-700">
          {{ t().contenedores.delete.title }}
        </h2>
        <p class="m-0 text-[0.75rem] tracking-[0.01em] text-brand-muted">
          {{ t().contenedores.delete.subtitle }}
        </p>
      </div>
    </div>
  </ng-template>

  <!-- Body -->
  <div class="flex flex-col gap-[1.1rem]">
    <!-- Warning banner -->
    <div
      class="flex items-start gap-2.5 rounded-lg border border-amber-200 bg-amber-50 px-3.5 py-3"
    >
      <i class="pi pi-exclamation-triangle mt-[1px] shrink-0 text-[0.95rem] text-amber-600"></i>
      <p class="m-0 text-[0.78rem] leading-relaxed text-amber-800">
        {{ t().contenedores.delete.warning }}
      </p>
    </div>

    <!-- Container name display -->
    <div class="flex flex-col gap-1.5">
      <span class="text-[0.72rem] font-medium uppercase tracking-[0.08em] text-brand-muted">
        {{ t().contenedores.delete.containerLabel }}
      </span>
      <div
        class="flex items-center gap-2 rounded-lg border border-[rgba(20,48,73,0.1)] bg-[rgba(20,48,73,0.05)] px-3.5 py-2.5"
      >
        <i class="pi pi-building text-[0.9rem] text-[rgba(20,48,73,0.4)]"></i>
        <span class="font-mono text-[0.88rem] font-bold tracking-[-0.01em] text-brand-navy">
          {{ contenedor()?.nombre }}
        </span>
      </div>
    </div>

    <!-- Confirmation input -->
    <div class="flex flex-col gap-1.5">
      <label
        for="confirm-delete-name"
        class="text-[0.78rem] font-semibold tracking-[-0.01em] text-brand-navy"
      >
        {{ t().contenedores.delete.confirmLabel }}
      </label>
      <input
        id="confirm-delete-name"
        pInputText
        type="text"
        [placeholder]="contenedor()?.nombre ?? ''"
        [value]="confirmValue()"
        (input)="onConfirmInput($event)"
        (blur)="confirmTouched.set(true)"
        class="w-full"
        [class.cd-input-error]="confirmTouched() && confirmValue() && !canDelete()"
        autocomplete="off"
      />
      @if (confirmTouched() && confirmValue() && !canDelete()) {
        <span class="flex items-center gap-1.5 text-[0.7rem] tracking-[0.01em] text-red-600">
          <i class="pi pi-times-circle text-[0.7rem]"></i>
          {{ t().contenedores.delete.confirmError }}
        </span>
      }
    </div>
  </div>

  <!-- Footer -->
  <ng-template pTemplate="footer">
    <div class="flex items-center justify-end gap-3 border-t border-[rgba(20,48,73,0.08)] pt-5">
      <p-button
        [label]="t().contenedores.delete.cancel"
        [outlined]="true"
        severity="secondary"
        (onClick)="onCancel()"
      />
      <p-button
        [label]="t().contenedores.delete.submit"
        [loading]="isDeleting()"
        [disabled]="!canDelete() || isDeleting()"
        (onClick)="onSubmit()"
        styleClass="cd-btn-delete"
      />
    </div>
  </ng-template>
</p-dialog>
