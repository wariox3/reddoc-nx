<lib-list-shell [breadcrumb]="breadcrumbItems()" [title]="t().entities.centroCosto.name">
  <lib-data-toolbar
    toolbar
    [primaryAction]="primaryAction"
    [trailingActions]="trailingActions"
    [searchPlaceholderKey]="'entities.centroCosto.searchPlaceholder'"
    [filtersEnabled]="true"
    [activeFiltersCount]="activeFilters().length"
    [deleteSelectedEnabled]="hasSelection()"
    [deleteSelectedCount]="selectedRows().length"
    (actionInvoked)="onToolbarAction($event)"
    (filtersToggle)="openFilters()"
    (filtersClear)="clearFilters()"
    (deleteSelected)="removeSelected()"
  />

  <lib-data-table
    table
    [columns]="columns"
    [items]="items()"
    [totalCount]="totalCount()"
    [loading]="isLoading()"
    [pageSize]="pageSize()"
    [currentPage]="currentPage()"
    [sort]="sort()"
    selectionMode="multiple"
    [selectedRows]="selectedRows()"
    [rowActions]="rowActions"
    [rowClickable]="true"
    (pageChange)="onPageChange($event)"
    (sortChange)="onSortChange($event)"
    (selectionChange)="onSelectionChange($event)"
    (rowActionInvoked)="onRowAction($event)"
    (rowClick)="onRowClick($event)"
  />
</lib-list-shell>

<lib-data-filter-modal
  [fields]="filterFields"
  [value]="activeFilters()"
  [visible]="filtersVisible()"
  (visibleChange)="filtersVisible.set($event)"
  (apply)="onFiltersApply($event)"
/>

<p-confirmDialog />

<app-import-dialog
  [visible]="importVisible()"
  (visibleChange)="onImportVisibleChange($event)"
  [title]="t().entities.centroCosto.import.title"
  [subtitle]="t().entities.centroCosto.import.subtitle"
  [importing]="importLoading()"
  [errors]="importErrors()"
  [errorSummary]="importErrorSummary()"
  [errorTotal]="importErrorTotal()"
  [mastersTouched]="importMasters()"
  (importRequested)="onImportRequested($event)"
  [exampleConfig]="exampleConfig"
/>
