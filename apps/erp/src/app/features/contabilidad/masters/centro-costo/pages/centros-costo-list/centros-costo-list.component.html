<lib-breadcrumb [items]="breadcrumbItems()" />

<header class="centros-costo-list__header">
  <div class="centros-costo-list__title-block">
    <h1 class="centros-costo-list__title">{{ t().entities.centroCosto.name }}</h1>
  </div>
</header>

<div class="card">
  <lib-data-toolbar
    [primaryAction]="primaryAction"
    [searchPlaceholderKey]="'entities.centroCosto.searchPlaceholder'"
    [filtersEnabled]="true"
    [activeFiltersCount]="activeFilters().length"
    [deleteSelectedEnabled]="hasSelection()"
    [deleteSelectedCount]="selectedRows().length"
    (actionInvoked)="onToolbarAction($event)"
    (filtersToggle)="openFilters()"
    (filtersClear)="clearFilters()"
    (deleteSelected)="removeSelected()"
  />

  <lib-data-table
    [columns]="columns"
    [items]="items()"
    [totalCount]="totalCount()"
    [loading]="isLoading()"
    [pageSize]="pageSize()"
    [currentPage]="currentPage()"
    [sort]="sort()"
    selectionMode="multiple"
    [selectedRows]="selectedRows()"
    [rowActions]="rowActions"
    [rowClickable]="true"
    (pageChange)="onPageChange($event)"
    (sortChange)="onSortChange($event)"
    (selectionChange)="onSelectionChange($event)"
    (rowActionInvoked)="onRowAction($event)"
    (rowClick)="onRowClick($event)"
  />
</div>

<lib-data-filter-modal
  [fields]="filterFields"
  [value]="activeFilters()"
  [visible]="filtersVisible()"
  (visibleChange)="filtersVisible.set($event)"
  (apply)="onFiltersApply($event)"
/>

<p-confirmDialog />
