<lib-breadcrumb [items]="breadcrumbItems()" />

<header class="base-document-list__header">
  <div class="base-document-list__title-block">
    <h1 class="base-document-list__title">{{ translate(document().displayNameKey) }}</h1>
  </div>
</header>

<div class="card">
  @if (showToolbar()) {
    <lib-data-toolbar
      [primaryAction]="primaryAction()"
      [filtersEnabled]="filtersEnabled()"
      [activeFiltersCount]="activeFilters().length"
      [deleteSelectedEnabled]="capabilities().canDelete && hasSelection()"
      [deleteSelectedCount]="selectedRows().length"
      (actionInvoked)="onToolbarAction($event)"
      (filtersToggle)="openFilters()"
      (filtersClear)="clearFilters()"
      (deleteSelected)="removeSelected()"
    />
  }

  <lib-data-table
    [columns]="columns()"
    [items]="items()"
    [totalCount]="totalCount()"
    [loading]="isLoading()"
    [pageSize]="pageSize()"
    [currentPage]="currentPage()"
    [sort]="sort()"
    [selectionMode]="capabilities().canSelectRows ? 'multiple' : 'none'"
    [selectedRows]="selectedRows()"
    [rowActions]="rowActions()"
    (pageChange)="onPageChange($event)"
    (sortChange)="onSortChange($event)"
    (selectionChange)="onSelectionChange($event)"
    (rowActionInvoked)="onRowAction($event)"
  />
</div>

@if (filtersEnabled()) {
  <lib-data-filter-modal
    [fields]="filterFields()"
    [value]="activeFilters()"
    [visible]="filtersVisible()"
    (visibleChange)="filtersVisible.set($event)"
    (apply)="onFiltersApply($event)"
  />
}

<p-confirmDialog />
