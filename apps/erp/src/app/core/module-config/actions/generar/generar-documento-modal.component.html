@let d = t().documentActions.generar;

<div class="flex flex-col gap-5">
  <!-- Header: badge + título + subtítulo (estándar de modales del ERP) -->
  <div class="flex items-center gap-3.5">
    <span
      class="flex h-10 w-10 shrink-0 items-center justify-center rounded-[10px] bg-brand-blue/15"
    >
      <i class="pi pi-bolt text-[1.1rem] text-brand-blue"></i>
    </span>
    <div class="flex flex-col gap-[0.1rem]">
      <h2
        class="m-0 text-[1.05rem] font-extrabold leading-tight tracking-[-0.03em] text-brand-navy"
      >
        {{ d.modalHeader }}
      </h2>
      <p class="m-0 text-[0.75rem] tracking-[0.01em] text-brand-muted">{{ d.modalSubtitle }}</p>
    </div>
  </div>

  <!-- Body + footer -->
  <form class="flex flex-col gap-[1.1rem]" (ngSubmit)="confirm()">
    <div class="flex flex-col">
      <label
        for="generar-fecha"
        class="mb-1.5 flex items-center gap-2 text-[0.78rem] font-semibold tracking-[-0.01em] text-brand-navy"
      >
        {{ d.fechaLabel }}
      </label>
      <p-datepicker
        inputId="generar-fecha"
        [ngModel]="fecha()"
        (ngModelChange)="fecha.set($event)"
        name="fecha"
        dateFormat="yy-mm-dd"
        [showIcon]="true"
        appendTo="body"
        [fluid]="true"
      />
    </div>

    <div
      class="mt-1 flex items-center justify-end gap-3 border-t border-[rgba(20,48,73,0.08)] pt-5"
    >
      <p-button
        type="button"
        [label]="d.cancel"
        [outlined]="true"
        severity="secondary"
        (onClick)="cancel()"
      />
      <p-button type="submit" [label]="d.submit" [disabled]="!fecha()" />
    </div>
  </form>
</div>
