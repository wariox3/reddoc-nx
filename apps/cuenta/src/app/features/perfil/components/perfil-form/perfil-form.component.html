<div class="pf-card">
  <form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>
    @if (errorMessage()) {
      <p-message severity="error" [text]="errorMessage()!" styleClass="w-full pf-error" />
    }

    <!-- Personal info section -->
    <div class="pf-section">
      <h2 class="pf-section__title">
        <i class="pi pi-id-card"></i>
        Información personal
      </h2>

      <div class="field">
        <label for="pf-nombre" class="field__label">Nombre corto</label>
        <input
          pInputText
          id="pf-nombre"
          formControlName="nombre_corto"
          placeholder="Ej. María García"
          fluid
        />
      </div>

      <div class="pf-grid">
        <div class="field">
          <label for="pf-celular" class="field__label">
            Celular <span class="field__req">*</span>
          </label>
          <input
            pInputText
            id="pf-celular"
            formControlName="celular"
            placeholder="+57 300 000 0000"
            fluid
          />
          @if (celularControl.invalid && celularControl.touched) {
            <small class="field__error">Este campo es obligatorio</small>
          }
        </div>

        <div class="field">
          <label for="pf-id" class="field__label">
            Número de identificación <span class="field__req">*</span>
          </label>
          <input
            pInputText
            id="pf-id"
            formControlName="numero_identificacion"
            placeholder="12345678"
            fluid
          />
          @if (identificacionControl.invalid && identificacionControl.touched) {
            <small class="field__error">Este campo es obligatorio</small>
          }
        </div>
      </div>
    </div>

    <p-divider />

    <!-- Contact section -->
    <div class="pf-section">
      <h2 class="pf-section__title">
        <i class="pi pi-envelope"></i>
        Contacto
      </h2>

      <div class="field">
        <label for="pf-email" class="field__label">Correo electrónico</label>
        <input pInputText id="pf-email" formControlName="email" fluid />
        <small class="field__hint">
          <i class="pi pi-lock"></i>
          El correo electrónico no se puede modificar
        </small>
      </div>
    </div>

    <!-- Actions -->
    <div class="pf-actions">
      <p-button
        type="submit"
        label="Guardar cambios"
        icon="pi pi-check"
        [loading]="isSaving()"
        [disabled]="isPristine() || isSaving() || form.invalid"
      />
    </div>
  </form>
</div>
