<div class="bg-brand-surface border border-[rgba(20,48,73,0.1)] rounded-xl p-8 max-[576px]:p-5">
  <form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>
    <!-- Personal info section -->
    <div class="flex flex-col gap-5 py-1">
      <h2
        class="flex items-center gap-2 text-[0.9375rem] font-bold text-brand-text tracking-tight m-0"
      >
        <i class="pi pi-id-card text-brand-navy"></i>
        Información personal
      </h2>

      <div class="grid grid-cols-2 max-[576px]:grid-cols-1 gap-1.5">
        <div>
          <label
            for="pf-nombre"
            class="text-[0.855rem] font-semibold text-brand-text tracking-tight"
          >
            Nombre corto
          </label>
          <input
            pInputText
            id="pf-nombre"
            formControlName="nombre_corto"
            placeholder="Ej. María García"
            fluid
          />
        </div>
      </div>

      <div class="grid grid-cols-2 gap-5 max-[576px]:grid-cols-1">
        <div class="flex flex-col gap-1.5">
          <label
            for="pf-celular"
            class="text-[0.855rem] font-semibold text-brand-text tracking-tight"
          >
            Celular <span class="text-red-500 ml-px">*</span>
          </label>
          <input
            pInputText
            id="pf-celular"
            formControlName="celular"
            placeholder="+57 300 000 0000"
            fluid
          />
          @if (celularControl.invalid && celularControl.touched) {
            <small class="text-[0.78rem] text-red-500">Este campo es obligatorio</small>
          }
        </div>

        <div class="flex flex-col gap-1.5">
          <label for="pf-id" class="text-[0.855rem] font-semibold text-brand-text tracking-tight">
            Número de identificación <span class="text-red-500 ml-px">*</span>
          </label>
          <input
            pInputText
            id="pf-id"
            formControlName="numero_identificacion"
            placeholder="12345678"
            fluid
          />
          @if (identificacionControl.invalid && identificacionControl.touched) {
            <small class="text-[0.78rem] text-red-500">Este campo es obligatorio</small>
          }
        </div>
      </div>
    </div>

    <p-divider />

    <!-- Contact section -->
    <div class="flex flex-col gap-5 py-1">
      <h2
        class="flex items-center gap-2 text-[0.9375rem] font-bold text-brand-text tracking-tight m-0"
      >
        <i class="pi pi-envelope text-brand-navy"></i>
        Contacto
      </h2>

      <div class="flex flex-col gap-1.5">
        <label for="pf-email" class="text-[0.855rem] font-semibold text-brand-text tracking-tight">
          Correo electrónico
        </label>
        <input pInputText id="pf-email" formControlName="email" fluid />
        <small class="inline-flex items-center gap-[0.3rem] text-[0.8rem] text-brand-muted">
          <i class="pi pi-lock text-[0.7rem]"></i>
          El correo electrónico no se puede modificar
        </small>
      </div>
    </div>

    <!-- Actions -->
    <div class="flex justify-end pt-6 mt-1">
      <p-button
        type="submit"
        label="Guardar cambios"
        icon="pi pi-check"
        [loading]="isSaving()"
        [disabled]="isPristine() || isSaving() || form.invalid"
      />
    </div>
  </form>
</div>
