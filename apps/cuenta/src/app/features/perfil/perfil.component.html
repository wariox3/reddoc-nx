<div class="p-8 max-[576px]:px-4 max-[576px]:py-5">
  <!-- Page header -->
  <div class="mb-6">
    <h1 class="text-2xl font-bold text-brand-text tracking-tight m-0 mb-1">Mi perfil</h1>
    <p class="text-sm text-brand-muted m-0">Consulta y actualiza tu información personal</p>
  </div>

  <div class="flex flex-col gap-5 animate-fade-up">
    <!-- Profile header card -->
    <div class="bg-brand-surface border border-[rgba(20,48,73,0.1)] rounded-xl overflow-hidden">
      <div class="flex items-center gap-4 px-5 py-4">
        <!-- Avatar with hover overlay to change photo -->
        <button
          class="relative shrink-0 group rounded-full disabled:cursor-not-allowed disabled:opacity-70"
          pTooltip="Cambiar foto"
          tooltipPosition="top"
          [disabled]="uploading()"
          (click)="openImageCropper()"
        >
          <div class="w-16 h-16 rounded-full overflow-hidden bg-brand-navy">
            @if (uploading()) {
              <div class="w-full h-full flex items-center justify-center text-white text-2xl">
                <i class="pi pi-spin pi-spinner"></i>
              </div>
            } @else {
              <lib-user-avatar [size]="64" variant="full" />
            }
          </div>
          <div
            class="absolute inset-0 rounded-full bg-black/40 opacity-0 group-hover:opacity-100 transition-opacity duration-150 flex items-center justify-center pointer-events-none"
          >
            <i class="pi pi-camera text-white text-sm"></i>
          </div>
        </button>

        <!-- User info -->
        <div class="flex min-w-0 flex-1 flex-col gap-[0.1rem]">
          <p class="m-0 text-[0.95rem] font-bold text-brand-text tracking-tight truncate">
            {{ displayName() }}
          </p>
          <p class="m-0 flex items-center gap-1.5 text-[0.75rem] text-brand-muted">
            <i class="pi pi-envelope text-[0.65rem] shrink-0"></i>
            <span class="truncate">{{ user()?.email }}</span>
          </p>
        </div>
      </div>
    </div>

    <!-- Form card -->
    <app-perfil-form (saved)="onProfileSaved()" />
  </div>
</div>

<!-- Image cropper dialog -->
<p-dialog
  header="Cambiar foto de perfil"
  [(visible)]="imageDialogVisible"
  [modal]="true"
  [style]="{ width: '480px' }"
  [draggable]="false"
>
  @if (imageDialogVisible()) {
    <app-image-cropper
      (imageSaved)="onImageSaved($event)"
      (cancelled)="imageDialogVisible.set(false)"
    />
  }
</p-dialog>
