<div class="perfil-page">
  <!-- Page header -->
  <div class="page-header">
    <div class="page-header__text">
      <h1 class="page-header__title">Mi perfil</h1>
      <p class="page-header__subtitle">Consulta y actualiza tu información personal</p>
    </div>
  </div>

  <div class="perfil-layout">
    <!-- Profile header card -->
    <div class="profile-header-card">
      <div class="profile-header-card__banner"></div>

      <div class="profile-header-card__info">
        <!-- Avatar with actions -->
        <div class="avatar-group">
          <div class="avatar-ring">
            @if (profileImage()) {
              <img [src]="profileImage()!" alt="Foto de perfil" class="avatar-ring__img" />
            } @else {
              <p-avatar [label]="initials()" shape="circle" styleClass="avatar-ring__placeholder" />
            }
          </div>

          <div class="avatar-controls">
            <button
              class="avatar-ctrl avatar-ctrl--edit"
              pTooltip="Cambiar foto"
              tooltipPosition="top"
              (click)="openImageCropper()"
            >
              <i class="pi pi-camera"></i>
            </button>
            @if (profileImage()) {
              <button
                class="avatar-ctrl avatar-ctrl--delete"
                pTooltip="Eliminar foto"
                tooltipPosition="top"
                (click)="deleteImage()"
              >
                <i class="pi pi-trash"></i>
              </button>
            }
          </div>
        </div>

        <!-- User info -->
        <div class="profile-header-card__details">
          <p class="profile-header-card__name">{{ displayName() }}</p>
          <p class="profile-header-card__email">
            <i class="pi pi-envelope"></i>
            {{ user()?.email }}
          </p>
        </div>
      </div>
    </div>

    <!-- Form card -->
    <app-perfil-form (saved)="onProfileSaved()" />
  </div>
</div>

<!-- Image cropper dialog -->
<p-dialog
  header="Cambiar foto de perfil"
  [(visible)]="imageDialogVisible"
  [modal]="true"
  [style]="{ width: '480px' }"
  [draggable]="false"
>
  @if (imageDialogVisible()) {
    <app-image-cropper
      (imageSaved)="onImageSaved($event)"
      (cancelled)="imageDialogVisible.set(false)"
    />
  }
</p-dialog>
