<p-dialog
  [visible]="visible()"
  (visibleChange)="visibleChange.emit($event)"
  [modal]="true"
  [draggable]="false"
  [resizable]="false"
  [closable]="!isSubmitting()"
  [closeOnEscape]="!isSubmitting()"
  [style]="{ width: '560px' }"
  styleClass="billing-profile-dialog"
>
  <!-- Header -->
  <ng-template pTemplate="header">
    <div class="flex items-center gap-3.5">
      <span
        class="flex h-10 w-10 shrink-0 items-center justify-center rounded-[10px] bg-brand-blue/15"
      >
        <i class="pi pi-id-card text-[1.1rem] text-brand-blue"></i>
      </span>
      <div class="flex flex-col gap-[0.1rem]">
        <h2
          class="m-0 text-[1.05rem] font-extrabold leading-tight tracking-[-0.03em] text-brand-text"
        >
          {{ dialogTitle() }}
        </h2>
        <p class="m-0 text-[0.75rem] tracking-[0.01em] text-brand-muted">
          {{ dialogSubtitle() }}
        </p>
      </div>
    </div>
  </ng-template>

  @if (visible()) {
    <form
      [formGroup]="form"
      (ngSubmit)="submit()"
      class="flex flex-col gap-[1.1rem]"
      autocomplete="off"
    >
      <!-- Row 1: tipo + número -->
      <div class="grid grid-cols-[220px_1fr] gap-3">
        <div class="flex flex-col">
          <label
            for="dlg-billing-identificacion"
            class="mb-1.5 text-[0.78rem] font-semibold tracking-[-0.01em] text-brand-navy"
          >
            Tipo
          </label>
          <lib-identificacion-select
            inputId="dlg-billing-identificacion"
            formControlName="identificacion"
            placeholder="Selecciona…"
            [invalid]="form.controls.identificacion.invalid && form.controls.identificacion.touched"
          />
          <lib-field-error
            [control]="form.controls.identificacion"
            [messages]="{ required: 'Selecciona un tipo de identificación.' }"
          />
        </div>

        <div class="flex flex-col">
          <label
            for="dlg-billing-numero"
            class="mb-1.5 text-[0.78rem] font-semibold tracking-[-0.01em] text-brand-navy"
          >
            Número de identificación
          </label>
          <input
            id="dlg-billing-numero"
            pInputText
            type="text"
            inputmode="numeric"
            maxlength="20"
            formControlName="numero"
            placeholder="Solo dígitos"
            class="w-full font-mono tabular-nums"
            [class.cd-input-error]="form.controls.numero.invalid && form.controls.numero.touched"
            (input)="onNumeroInput($event)"
          />
          <lib-field-error
            [control]="form.controls.numero"
            [messages]="{ pattern: 'Solo dígitos (0–9).', minlength: 'Mínimo 5 dígitos.' }"
          />
        </div>
      </div>

      <!-- Row 2: nombre -->
      <div class="flex flex-col">
        <label
          for="dlg-billing-nombre"
          class="mb-1.5 text-[0.78rem] font-semibold tracking-[-0.01em] text-brand-navy"
        >
          {{ nombreLabel() }}
        </label>
        <input
          id="dlg-billing-nombre"
          pInputText
          type="text"
          maxlength="100"
          formControlName="nombre"
          [placeholder]="nombrePlaceholder()"
          class="w-full"
          [class.cd-input-error]="form.controls.nombre.invalid && form.controls.nombre.touched"
        />
        <lib-field-error [control]="form.controls.nombre" />
      </div>

      <!-- Row 3: email + teléfono -->
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
        <div class="flex flex-col">
          <label
            for="dlg-billing-email"
            class="mb-1.5 text-[0.78rem] font-semibold tracking-[-0.01em] text-brand-navy"
          >
            Email de facturación
          </label>
          <input
            id="dlg-billing-email"
            pInputText
            type="email"
            formControlName="email"
            placeholder="facturacion@empresa.co"
            class="w-full"
            [class.cd-input-error]="form.controls.email.invalid && form.controls.email.touched"
          />
          <lib-field-error [control]="form.controls.email" />
        </div>
        <div class="flex flex-col">
          <label
            for="dlg-billing-telefono"
            class="mb-1.5 text-[0.78rem] font-semibold tracking-[-0.01em] text-brand-navy"
          >
            Teléfono
          </label>
          <input
            id="dlg-billing-telefono"
            pInputText
            type="tel"
            inputmode="numeric"
            formControlName="telefono"
            placeholder="3001234567"
            class="w-full font-mono tabular-nums"
            [class.cd-input-error]="
              form.controls.telefono.invalid && form.controls.telefono.touched
            "
          />
          <lib-field-error
            [control]="form.controls.telefono"
            [messages]="{ pattern: 'Solo dígitos (7–15 caracteres).' }"
          />
        </div>
      </div>

      <!-- Row 4: dirección + ciudad -->
      <div class="grid grid-cols-1 sm:grid-cols-[1fr_220px] gap-3">
        <div class="flex flex-col">
          <label
            for="dlg-billing-direccion"
            class="mb-1.5 text-[0.78rem] font-semibold tracking-[-0.01em] text-brand-navy"
          >
            Dirección fiscal
          </label>
          <input
            id="dlg-billing-direccion"
            pInputText
            type="text"
            maxlength="255"
            formControlName="direccion"
            placeholder="Calle 100 # 11-32, Oficina 502"
            class="w-full"
            [class.cd-input-error]="
              form.controls.direccion.invalid && form.controls.direccion.touched
            "
          />
          <lib-field-error [control]="form.controls.direccion" />
        </div>
        <div class="flex flex-col">
          <label
            for="dlg-billing-ciudad"
            class="mb-1.5 text-[0.78rem] font-semibold tracking-[-0.01em] text-brand-navy"
          >
            Ciudad
          </label>
          <lib-ciudad-autocomplete
            inputId="dlg-billing-ciudad"
            formControlName="ciudad"
            placeholder="Bogotá, Medellín…"
            [invalid]="form.controls.ciudad.invalid && form.controls.ciudad.touched"
          />
          <lib-field-error
            [control]="form.controls.ciudad"
            [messages]="{ required: 'Selecciona una ciudad de la lista.' }"
          />
        </div>
      </div>
    </form>
  }

  <!-- Footer -->
  <ng-template pTemplate="footer">
    <div class="flex items-center justify-end gap-2 pt-2">
      <p-button
        label="Cancelar"
        [outlined]="true"
        severity="secondary"
        (onClick)="onCancel()"
        [disabled]="isSubmitting()"
      />
      <p-button
        [label]="submitLabel()"
        icon="pi pi-arrow-right"
        iconPos="right"
        [loading]="isSubmitting()"
        [disabled]="form.invalid || isSubmitting()"
        (onClick)="submit()"
      />
    </div>
  </ng-template>
</p-dialog>
