<p-dialog
  [visible]="visible()"
  (visibleChange)="visibleChange.emit($event)"
  [modal]="true"
  [draggable]="false"
  [resizable]="false"
  [closable]="!isSubmitting()"
  [closeOnEscape]="!isSubmitting()"
  [style]="{ width: '440px' }"
  styleClass="billing-profile-delete-dialog"
>
  <ng-template pTemplate="header">
    <div class="flex items-center gap-3.5">
      <span
        class="flex h-10 w-10 shrink-0 items-center justify-center rounded-[10px] bg-red-50 text-red-600"
      >
        <i class="pi pi-trash text-[1.05rem]"></i>
      </span>
      <div class="flex flex-col gap-[0.1rem]">
        <h2
          class="m-0 text-[1.05rem] font-extrabold leading-tight tracking-[-0.03em] text-brand-text"
        >
          Eliminar perfil de facturación
        </h2>
        <p class="m-0 text-[0.75rem] tracking-[0.01em] text-brand-muted">
          Esta acción no se puede deshacer.
        </p>
      </div>
    </div>
  </ng-template>

  @if (profile(); as p) {
    <div
      class="rounded-[10px] border border-[rgba(20,48,73,0.10)] bg-brand-bg/60 px-4 py-3 flex flex-col gap-1"
    >
      <span class="text-[0.62rem] font-bold tracking-[0.16em] uppercase text-brand-muted font-mono">
        Vas a eliminar
      </span>
      <span class="truncate text-[0.95rem] font-semibold text-brand-text leading-tight">
        {{ p.nombre }}
      </span>
      <span class="font-mono text-[0.78rem] text-brand-muted tabular-nums">
        {{ p.tipo }} · {{ p.numero }}
      </span>
    </div>
  }

  <ng-template pTemplate="footer">
    <div class="flex items-center justify-end gap-2 pt-2">
      <p-button
        label="Cancelar"
        [outlined]="true"
        severity="secondary"
        (onClick)="onCancel()"
        [disabled]="isSubmitting()"
      />
      <p-button
        label="Sí, eliminar"
        icon="pi pi-trash"
        severity="danger"
        [loading]="isSubmitting()"
        [disabled]="isSubmitting()"
        (onClick)="onConfirm()"
      />
    </div>
  </ng-template>
</p-dialog>
