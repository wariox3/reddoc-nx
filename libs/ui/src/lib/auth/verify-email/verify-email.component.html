<div class="verify-layout">
  <div class="verify-card">
    @if (isLoading()) {
      <div class="verify-state">
        <div class="verify-state__icon verify-state__icon--loading">
          <i class="pi pi-spin pi-spinner"></i>
        </div>
        <h2 class="verify-state__title">{{ t().auth.verifyEmail.loading.title }}</h2>
        <p class="verify-state__desc">{{ t().auth.verifyEmail.loading.desc }}</p>
      </div>
    } @else if (verified()) {
      <lib-auth-success-state
        icon="pi-check"
        [title]="t().auth.verifyEmail.success.title"
        [description]="t().auth.verifyEmail.success.desc"
      >
        <a
          routerLink="/auth/login"
          class="inline-flex items-center gap-1.5 text-sm font-semibold text-brand-blue no-underline transition-opacity hover:opacity-75"
        >
          <i class="pi pi-arrow-left text-xs"></i>
          {{ t().auth.verifyEmail.success.action }}
        </a>
      </lib-auth-success-state>
    } @else {
      <lib-auth-success-state
        variant="error"
        icon="pi-times"
        [title]="t().auth.verifyEmail.error.title"
        [description]="errorMessage()!"
      >
        <a
          routerLink="/auth/resend-verification"
          class="inline-flex items-center gap-1.5 text-sm font-semibold text-brand-blue no-underline transition-opacity hover:opacity-75"
        >
          <i class="pi pi-arrow-left text-xs"></i>
          {{ t().auth.verifyEmail.error.action }}
        </a>
      </lib-auth-success-state>
    }
  </div>
</div>
