<lib-breadcrumb [items]="breadcrumb()" />

<section class="list-shell__card">
  <!-- Cabecera compacta: solo el título; el total de registros lo da el paginador -->
  <header class="list-shell__head">
    <h1 class="list-shell__title">{{ title() }}</h1>
  </header>

  <!-- Cuerpo: botonera (proyectada) encima de la tabla embebida en un recuadro -->
  <div class="list-shell__body">
    <ng-content select="[toolbar]" />

    <div class="list-shell__table">
      <ng-content select="[table]" />
    </div>
  </div>
</section>
