<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reddoc — Mejorar suscripción</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&display=swap"
      rel="stylesheet"
    />
    <script
      src="https://unpkg.com/react@18.3.1/umd/react.development.js"
      integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"
      integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"
      integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y"
      crossorigin="anonymous"
    ></script>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      :root {
        --bg: #f8f9fa;
        --card-bg: #ffffff;
        --border: #e2e8f0;
        --border-light: #f1f5f9;
        --text: #13263c;
        --text-muted: #526680;
        --text-subtle: #8fa4b8;
        --navbar-bg: #ffffff;
      }
      body {
        font-family: 'DM Sans', system-ui, sans-serif;
        background: var(--bg);
        color: var(--text);
        -webkit-font-smoothing: antialiased;
      }
      a {
        color: inherit;
        text-decoration: none;
      }
      button {
        font-family: inherit;
      }

      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(8px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      @keyframes spin {
        from {
          transform: rotate(0deg);
        }
        to {
          transform: rotate(360deg);
        }
      }
      .step-anim {
        animation: fadeUp 0.24s ease both;
      }

      ::-webkit-scrollbar {
        width: 5px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: var(--border);
        border-radius: 3px;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="text/babel" src="tweaks-panel.jsx"></script>
    <script type="text/babel">
      const { useState, useEffect, useMemo } = React;

      /* ─────────────────────────── DATA ─────────────────────────── */

      const PLANS_RAW = [
        {
          id: 1,
          nombre: 'Impulso Facturación',
          precio: '16900.00',
          suscripcion_clase_id: 1,
          suscripcion_categoria_id: 1,
        },
        {
          id: 2,
          nombre: 'Impulso ERP',
          precio: '22900.00',
          suscripcion_clase_id: 1,
          suscripcion_categoria_id: 2,
        },
        {
          id: 3,
          nombre: 'Crecimiento Facturación',
          precio: '49900.00',
          suscripcion_clase_id: 1,
          suscripcion_categoria_id: 1,
        },
        {
          id: 4,
          nombre: 'Crecimiento ERP',
          precio: '74900.00',
          suscripcion_clase_id: 1,
          suscripcion_categoria_id: 2,
        },
        {
          id: 5,
          nombre: 'Expansión Facturación',
          precio: '95900.00',
          suscripcion_clase_id: 1,
          suscripcion_categoria_id: 1,
        },
        {
          id: 6,
          nombre: 'Expansión ERP',
          precio: '149000.00',
          suscripcion_clase_id: 1,
          suscripcion_categoria_id: 2,
        },
        {
          id: 7,
          nombre: 'Éxito Facturación',
          precio: '172900.00',
          suscripcion_clase_id: 1,
          suscripcion_categoria_id: 1,
        },
        {
          id: 8,
          nombre: 'Éxito ERP',
          precio: '229900.00',
          suscripcion_clase_id: 1,
          suscripcion_categoria_id: 2,
        },
      ];

      /* Tier label (Impulso/Crecimiento/Expansión/Éxito) -> features */
      const FEATURES = {
        Impulso: [
          'Hasta 3 usuarios',
          'Funciones esenciales',
          'Soporte por email',
          'Reportes básicos',
        ],
        Crecimiento: [
          'Hasta 10 usuarios',
          'Integraciones estándar',
          'Soporte prioritario',
          'Reportes avanzados',
        ],
        Expansión: ['Hasta 25 usuarios', 'API completa', 'Soporte 24/7', 'Multi-sucursal'],
        Éxito: ['Usuarios ilimitados', 'Instancia dedicada', 'Account manager', 'SLA 99.9%'],
      };

      const STEPS = ['Plan', 'Pago', 'Confirmar'];

      const CATEGORIES = {
        1: { id: 'fact', label: 'Facturación' },
        2: { id: 'erp', label: 'ERP' },
      };

      /* ─────────────────────────── HELPERS ───────────────────────── */

      const fmtPrice = (n) => '$' + Math.round(n).toLocaleString('es-CO');

      const tier = (nombre) => nombre.split(' ')[0];
      const isPopular = (nombre) => nombre.startsWith('Expansión'); // mid-tier popular

      const initials = (n) =>
        n
          .split(' ')
          .filter(Boolean)
          .slice(0, 2)
          .map((w) => w[0])
          .join('')
          .toUpperCase();

      /* Read query params for context */
      const getCtx = () => {
        const p = new URLSearchParams(window.location.search);
        return {
          cliente: p.get('cliente') || 'Empresa',
          plan_actual: p.get('plan') || 'Prueba ERP',
          fecha_fin: p.get('fin') || '',
        };
      };

      /* ─────────────────────────── ICONS ─────────────────────────── */

      const Svg = ({ children, size = 16, stroke = 2 }) => (
        <svg
          width={size}
          height={size}
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          strokeWidth={stroke}
          strokeLinecap="round"
          strokeLinejoin="round"
        >
          {children}
        </svg>
      );

      const IcoCheck = ({ s = 12 }) => (
        <svg width={s} height={s} viewBox="0 0 14 14" fill="none">
          <path
            d="M2 7.5L5.5 11L12 3"
            stroke="currentColor"
            strokeWidth="2"
            strokeLinecap="round"
            strokeLinejoin="round"
          />
        </svg>
      );
      const IcoArrowL = ({ s = 14 }) => (
        <Svg size={s}>
          <line x1="19" y1="12" x2="5" y2="12" />
          <polyline points="12 19 5 12 12 5" />
        </Svg>
      );
      const IcoArrowR = ({ s = 14 }) => (
        <Svg size={s}>
          <line x1="5" y1="12" x2="19" y2="12" />
          <polyline points="12 5 19 12 12 19" />
        </Svg>
      );
      const IcoMoon = () => (
        <Svg size={15}>
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
        </Svg>
      );
      const IcoSun = () => (
        <svg
          width="15"
          height="15"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          strokeWidth="2"
          strokeLinecap="round"
          strokeLinejoin="round"
        >
          <circle cx="12" cy="12" r="5" />
          {[0, 45, 90, 135, 180, 225, 270, 315].map((a) => {
            const r = (a * Math.PI) / 180,
              x1 = 12 + 8 * Math.cos(r),
              y1 = 12 + 8 * Math.sin(r),
              x2 = 12 + 10.5 * Math.cos(r),
              y2 = 12 + 10.5 * Math.sin(r);
            return <line key={a} x1={x1} y1={y1} x2={x2} y2={y2} />;
          })}
        </svg>
      );
      const IcoCaret = () => (
        <Svg size={12}>
          <polyline points="9 18 15 12 9 6" />
        </Svg>
      );
      const IcoLock = ({ s = 13 }) => (
        <Svg size={s}>
          <rect x="3" y="11" width="18" height="11" rx="2" />
          <path d="M7 11V7a5 5 0 0 1 10 0v4" />
        </Svg>
      );
      const IcoShield = ({ s = 13 }) => (
        <Svg size={s}>
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
        </Svg>
      );
      const IcoEdit = ({ s = 13 }) => (
        <Svg size={s}>
          <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7" />
          <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z" />
        </Svg>
      );
      const IcoSparkle = ({ s = 14 }) => (
        <Svg size={s}>
          <path d="M12 2l2 7 7 2-7 2-2 7-2-7-7-2 7-2z" fill="currentColor" stroke="none" />
        </Svg>
      );

      /* ─────────────────────────── STEPPER ───────────────────────── */

      const Stepper = ({ current, accent }) => (
        <div style={{ display: 'flex', alignItems: 'flex-start', gap: 0, marginBottom: '26px' }}>
          {STEPS.map((label, i) => (
            <React.Fragment key={i}>
              <div
                style={{
                  display: 'flex',
                  flexDirection: 'column',
                  alignItems: 'center',
                  gap: '6px',
                }}
              >
                <div
                  style={{
                    width: '30px',
                    height: '30px',
                    borderRadius: '50%',
                    display: 'flex',
                    alignItems: 'center',
                    justifyContent: 'center',
                    fontSize: '12px',
                    fontWeight: 600,
                    transition: 'all 0.25s',
                    background: i <= current ? accent : 'var(--bg)',
                    color: i <= current ? '#fff' : 'var(--text-subtle)',
                    border: i <= current ? 'none' : '1.5px solid var(--border)',
                  }}
                >
                  {i < current ? <IcoCheck s={12} /> : i + 1}
                </div>
                <span
                  style={{
                    fontSize: '11px',
                    whiteSpace: 'nowrap',
                    fontWeight: i === current ? 600 : 400,
                    color: i === current ? 'var(--text)' : 'var(--text-subtle)',
                  }}
                >
                  {label}
                </span>
              </div>
              {i < STEPS.length - 1 && (
                <div
                  style={{
                    flex: 1,
                    height: '1.5px',
                    margin: '14px 6px 0',
                    background: i < current ? accent : 'var(--border)',
                    transition: 'background 0.3s',
                  }}
                />
              )}
            </React.Fragment>
          ))}
        </div>
      );

      /* ─────────────────────────── CATEGORY TABS ─────────────────── */

      const CategoryTabs = ({ active, onChange, accent }) => (
        <div
          style={{
            display: 'inline-flex',
            background: 'var(--bg)',
            border: '1.5px solid var(--border)',
            borderRadius: '8px',
            padding: '3px',
            gap: '2px',
          }}
        >
          {[
            ['fact', 'Facturación'],
            ['erp', 'ERP'],
          ].map(([id, label]) => (
            <button
              key={id}
              onClick={() => onChange(id)}
              style={{
                padding: '6px 22px',
                borderRadius: '6px',
                border: 'none',
                background: active === id ? accent : 'transparent',
                color: active === id ? '#fff' : 'var(--text-muted)',
                fontSize: '13px',
                fontWeight: active === id ? 600 : 500,
                cursor: 'pointer',
                transition: 'all 0.18s',
                fontFamily: 'inherit',
              }}
            >
              {label}
            </button>
          ))}
        </div>
      );

      /* ─────────────────────────── FREQUENCY TOGGLE ──────────────── */

      const FrequencyToggle = ({ annual, onChange, accent }) => (
        <div style={{ display: 'inline-flex', alignItems: 'center', gap: '10px' }}>
          <span
            style={{
              fontSize: '13px',
              fontWeight: annual ? 400 : 600,
              color: annual ? 'var(--text-muted)' : 'var(--text)',
              transition: 'color 0.15s',
            }}
          >
            Mensual
          </span>

          <button
            role="switch"
            aria-checked={annual}
            onClick={() => onChange(!annual)}
            style={{
              position: 'relative',
              width: '42px',
              height: '24px',
              borderRadius: '100px',
              border: 'none',
              cursor: 'pointer',
              background: annual ? accent : 'var(--border)',
              transition: 'background 0.2s',
            }}
          >
            <span
              style={{
                position: 'absolute',
                top: '2px',
                left: annual ? '20px' : '2px',
                width: '20px',
                height: '20px',
                borderRadius: '50%',
                background: '#fff',
                boxShadow: '0 1px 3px rgba(0,0,0,0.18)',
                transition: 'left 0.2s',
              }}
            />
          </button>

          <span
            style={{
              fontSize: '13px',
              fontWeight: annual ? 600 : 400,
              color: annual ? 'var(--text)' : 'var(--text-muted)',
              transition: 'color 0.15s',
            }}
          >
            Anual
          </span>

          <span
            style={{
              display: 'inline-flex',
              alignItems: 'center',
              padding: '3px 9px',
              borderRadius: '100px',
              fontSize: '11px',
              fontWeight: 600,
              border: `1px solid ${annual ? accent + '66' : 'var(--border)'}`,
              color: annual ? accent : 'var(--text-subtle)',
              background: annual ? accent + '12' : 'transparent',
              transition: 'all 0.18s',
              letterSpacing: '0.02em',
            }}
          >
            Ahorra 10%
          </span>
        </div>
      );

      /* ─────────────────────────── PLAN CARD ─────────────────────── */

      const PlanCard = ({ plan, selected, onSelect, annual, accent, currentPlanName }) => {
        const [hover, setHover] = useState(false);
        const monthly = parseFloat(plan.precio);
        const displayed = annual ? Math.round(monthly * 0.9) : monthly;
        const annualTotal = annual ? Math.round(monthly * 0.9 * 12) : null;
        const tierName = tier(plan.nombre);
        const popular = isPopular(plan.nombre);
        const isCurrent = plan.nombre === currentPlanName;

        return (
          <button
            type="button"
            onClick={() => !isCurrent && onSelect(plan.id)}
            onMouseEnter={() => setHover(true)}
            onMouseLeave={() => setHover(false)}
            disabled={isCurrent}
            style={{
              position: 'relative',
              textAlign: 'left',
              padding: '20px 18px 16px',
              borderRadius: '12px',
              cursor: isCurrent ? 'not-allowed' : 'pointer',
              border: `${selected ? 2 : 1.5}px solid ${selected ? accent : hover && !isCurrent ? accent + '55' : 'var(--border)'}`,
              background: selected ? accent + '0a' : 'var(--card-bg)',
              opacity: isCurrent ? 0.55 : 1,
              transition: 'border-color 0.15s, background 0.15s, transform 0.15s',
              transform: hover && !selected && !isCurrent ? 'translateY(-1px)' : 'none',
              fontFamily: 'inherit',
              color: 'inherit',
              display: 'flex',
              flexDirection: 'column',
              gap: '12px',
              boxShadow: selected ? `0 4px 16px -8px ${accent}55` : '0 1px 3px rgba(0,0,0,0.03)',
            }}
          >
            {popular && !isCurrent && (
              <div
                style={{
                  position: 'absolute',
                  top: '-10px',
                  left: '18px',
                  background: 'var(--text)',
                  color: 'var(--card-bg)',
                  fontSize: '10px',
                  fontWeight: 700,
                  padding: '3px 9px',
                  borderRadius: '100px',
                  letterSpacing: '0.06em',
                  whiteSpace: 'nowrap',
                  textTransform: 'uppercase',
                }}
              >
                Recomendado
              </div>
            )}

            {isCurrent && (
              <div
                style={{
                  position: 'absolute',
                  top: '-10px',
                  left: '18px',
                  background: 'var(--border)',
                  color: 'var(--text-muted)',
                  fontSize: '10px',
                  fontWeight: 700,
                  padding: '3px 9px',
                  borderRadius: '100px',
                  letterSpacing: '0.06em',
                  whiteSpace: 'nowrap',
                  textTransform: 'uppercase',
                }}
              >
                Plan actual
              </div>
            )}

            {/* Radio */}
            <div
              style={{
                position: 'absolute',
                top: '16px',
                right: '16px',
                width: '17px',
                height: '17px',
                borderRadius: '50%',
                border: selected ? `5px solid ${accent}` : '1.5px solid var(--text-subtle)',
                transition: 'border 0.15s',
                background: 'var(--card-bg)',
              }}
            />

            <div style={{ paddingRight: '26px' }}>
              <div
                style={{
                  fontSize: '11px',
                  fontWeight: 600,
                  color: 'var(--text-subtle)',
                  letterSpacing: '0.06em',
                  textTransform: 'uppercase',
                  marginBottom: '4px',
                }}
              >
                {tierName}
              </div>
              <div
                style={{
                  fontSize: '15px',
                  fontWeight: 600,
                  color: 'var(--text)',
                  letterSpacing: '-0.01em',
                }}
              >
                {plan.nombre}
              </div>
            </div>

            <div>
              <div style={{ display: 'flex', alignItems: 'baseline', gap: '4px' }}>
                <span
                  style={{
                    fontSize: '24px',
                    fontWeight: 700,
                    color: 'var(--text)',
                    letterSpacing: '-0.02em',
                    lineHeight: 1,
                    fontVariantNumeric: 'tabular-nums',
                  }}
                >
                  {fmtPrice(displayed)}
                </span>
                <span style={{ fontSize: '12px', color: 'var(--text-muted)' }}>/mes</span>
              </div>
              {annual && (
                <div
                  style={{
                    fontSize: '11px',
                    color: 'var(--text-subtle)',
                    marginTop: '3px',
                    fontVariantNumeric: 'tabular-nums',
                  }}
                >
                  {fmtPrice(annualTotal)} facturados anualmente
                </div>
              )}
              {!annual && (
                <div style={{ fontSize: '11px', color: 'var(--text-subtle)', marginTop: '3px' }}>
                  Facturación mensual
                </div>
              )}
            </div>

            <div
              style={{
                borderTop: '1px solid var(--border-light)',
                paddingTop: '12px',
                display: 'flex',
                flexDirection: 'column',
                gap: '7px',
              }}
            >
              {FEATURES[tierName]?.map((f, i) => (
                <div key={i} style={{ display: 'flex', alignItems: 'center', gap: '8px' }}>
                  <span
                    style={{
                      width: '15px',
                      height: '15px',
                      borderRadius: '50%',
                      display: 'inline-flex',
                      alignItems: 'center',
                      justifyContent: 'center',
                      background: selected ? accent : 'var(--border-light)',
                      color: selected ? '#fff' : 'var(--text-muted)',
                      flexShrink: 0,
                      transition: 'all 0.15s',
                    }}
                  >
                    <IcoCheck s={9} />
                  </span>
                  <span style={{ fontSize: '12.5px', color: 'var(--text-muted)' }}>{f}</span>
                </div>
              ))}
            </div>
          </button>
        );
      };

      /* ─────────────────────────── STEP 1: PLAN ──────────────────── */

      const StepPlan = ({
        plans,
        planId,
        setPlanId,
        category,
        setCategory,
        annual,
        setAnnual,
        accent,
        currentPlanName,
      }) => {
        const filtered = useMemo(
          () => plans.filter((p) => CATEGORIES[p.suscripcion_categoria_id].id === category),
          [plans, category],
        );

        return (
          <div style={{ marginTop: '4px' }}>
            <div
              style={{
                display: 'flex',
                alignItems: 'center',
                justifyContent: 'space-between',
                gap: '16px',
                marginBottom: '20px',
                flexWrap: 'wrap',
              }}
            >
              <CategoryTabs active={category} onChange={setCategory} accent={accent} />
              <FrequencyToggle annual={annual} onChange={setAnnual} accent={accent} />
            </div>

            <div
              style={{
                display: 'grid',
                gridTemplateColumns: 'repeat(auto-fit, minmax(220px, 1fr))',
                gap: '14px',
                paddingTop: '10px',
              }}
            >
              {filtered.map((p) => (
                <PlanCard
                  key={p.id}
                  plan={p}
                  selected={planId === p.id}
                  onSelect={setPlanId}
                  annual={annual}
                  accent={accent}
                  currentPlanName={currentPlanName}
                />
              ))}
            </div>
          </div>
        );
      };

      /* ─────────────────────────── CARD HELPERS ──────────────────── */

      const detectBrand = (num) => {
        const n = (num || '').replace(/\s/g, '');
        if (/^4/.test(n)) return 'visa';
        if (/^(5[1-5]|2[2-7])/.test(n)) return 'mastercard';
        if (/^3[47]/.test(n)) return 'amex';
        if (/^6(?:011|5)/.test(n)) return 'discover';
        return null;
      };

      const brandMaxLen = (brand) => (brand === 'amex' ? 15 : 16);
      const brandCvvLen = (brand) => (brand === 'amex' ? 4 : 3);

      const formatCardNumber = (val, brand) => {
        const digits = (val || '').replace(/\D/g, '').slice(0, brandMaxLen(brand));
        if (brand === 'amex') {
          const g = digits.match(/^(\d{0,4})(\d{0,6})(\d{0,5})$/);
          return [g[1], g[2], g[3]].filter(Boolean).join(' ');
        }
        return digits.replace(/(\d{4})(?=\d)/g, '$1 ').trim();
      };

      const formatExpiry = (val) => {
        const digits = (val || '').replace(/\D/g, '').slice(0, 4);
        if (digits.length <= 2) return digits;
        return digits.slice(0, 2) + '/' + digits.slice(2);
      };

      const cardLast4 = (num) => {
        const n = (num || '').replace(/\s/g, '');
        return n.length >= 4 ? n.slice(-4) : '••••';
      };

      const isCardValid = (card) => {
        const n = (card.number || '').replace(/\s/g, '');
        const brand = detectBrand(n);
        const exp = card.expiry || '';
        const [mm, yy] = exp.split('/');
        const m = parseInt(mm, 10);
        const expValid = /^\d{2}\/\d{2}$/.test(exp) && m >= 1 && m <= 12;
        const numValid = brand === 'amex' ? n.length === 15 : n.length >= 16;
        const cvvValid = (card.cvv || '').length === brandCvvLen(brand);
        const nameValid = (card.name || '').trim().length >= 2;
        return numValid && nameValid && expValid && cvvValid;
      };

      /* ─────────────────────────── BRAND LOGOS ───────────────────── */

      const VisaLogo = ({ light = true }) => (
        <svg width="42" height="14" viewBox="0 0 42 14" fill="none">
          <text
            x="0"

      /* ─────────────────────────── APP ───────────────────────────── */

      const ACCENTS = ['#009ef7', '#7c3aed', '#059669', '#e11d48'];

      const App = () => {

        const [t, setTweak] = useTweaks(
          /*EDITMODE-BEGIN*/ {
            dark: false,
            accent: '#009ef7',
          } /*EDITMODE-END*/,
        );

        const ctx = useMemo(getCtx, []);
        const [step, setStep] = useState(0);
        const [animKey, setAnimKey] = useState(0);
        const [planId, setPlanId] = useState(null);
        const [category, setCategory] = useState('erp');
        const [annual, setAnnual] = useState(false);
        const [card, setCard] = useState({ number: '', name: '', expiry: '', cvv: '' });
        const [loading, setLoading] = useState(false);
        const [done, setDone] = useState(false);

        useEffect(() => {
          const r = document.documentElement;
          if (t.dark) {
            r.style.setProperty('--bg', '#13263c');
            r.style.setProperty('--card-bg', '#1a3350');
            r.style.setProperty('--border', '#22436a');
            r.style.setProperty('--border-light', '#1d3b5e');
            r.style.setProperty('--text', '#f0f6fc');
            r.style.setProperty('--text-muted', '#9ab5cf');
            r.style.setProperty('--text-subtle', '#4f7396');
            r.style.setProperty('--navbar-bg', '#0e1e2e');
          } else {
            r.style.setProperty('--bg', '#f8f9fa');
            r.style.setProperty('--card-bg', '#ffffff');
            r.style.setProperty('--border', '#e2e8f0');
            r.style.setProperty('--border-light', '#f1f5f9');
            r.style.setProperty('--text', '#13263c');
            r.style.setProperty('--text-muted', '#526680');
            r.style.setProperty('--text-subtle', '#8fa4b8');
            r.style.setProperty('--navbar-bg', '#ffffff');
          }
          document.body.style.background = 'var(--bg)';
        }, [t.dark]);

        const accent = t.accent;
        const selectedPlan = PLANS_RAW.find((p) => p.id === planId);

        const canNext = step === 0 ? planId !== null : step === 1 ? isCardValid(card) : true;

        const next = () => {
          if (!canNext) return;
          setStep((s) => s + 1);
          setAnimKey((k) => k + 1);
        };
        const back = () => {
          if (step === 0) {
            window.location.href = 'Suscripciones.html';
            return;
          }
          setStep((s) => s - 1);
          setAnimKey((k) => k + 1);
        };
        const goEdit = (s) => {
          setStep(s);
          setAnimKey((k) => k + 1);
        };

        const confirmPayment = () => {
          setLoading(true);
          setTimeout(() => {
            setLoading(false);
            setDone(true);
          }, 1400);
        };

        const HEADERS = [
          [
            'Selecciona un plan',
            `Elige entre planes de ${CATEGORIES[1].label} o ${CATEGORIES[2].label} y la frecuencia de facturación.`,
          ],
          [
            'Información de pago',
            'Ingresa los datos de tu tarjeta. La vista previa se actualiza en tiempo real.',
          ],
          ['Confirma y activa', 'Revisa el resumen antes de procesar el pago.'],
        ];

        return (
          <div
            style={{
              minHeight: '100vh',
              background: 'var(--bg)',
              color: 'var(--text)',
              transition: 'background 0.2s, color 0.2s',

              <div
                style={{ display: 'flex', alignItems: 'center', gap: '5px', marginBottom: '18px' }}
              >
                {[
                  ['Inicio', '#'],
                  ['Suscripciones', 'Suscripciones.html'],
                  ['Mejorar', null],
                ].map(([c, href], i, arr) => (
                  <React.Fragment key={c}>
                    {href ? (
                      <a
                        href={href}
                        style={{
                          fontSize: '12.5px',
                          color: 'var(--text-muted)',
                          cursor: 'pointer',

                      >

                      </a>
                    ) : (
                      <span style={{ fontSize: '12.5px', color: 'var(--text)', fontWeight: 500 }}>
                        {c}
                      </span>
                    )}
                    {i < arr.length - 1 && (
                      <span style={{ color: 'var(--text-subtle)', display: 'flex' }}>
                        <IcoCaret />
                      </span>
                    )}

                  style={{
                    fontSize: '24px',
                    fontWeight: 700,
                    color: 'var(--text)',
                    letterSpacing: '-0.025em',
                    marginBottom: '4px',
                  }}
                >
                  Mejorar suscripción
                </h1>
                <p style={{ fontSize: '13.5px', color: 'var(--text-muted)' }}>
                  Activa un plan completo para seguir operando sin límites.
                </p>

              <ContextHeader cliente={ctx.cliente} planActual={ctx.plan_actual} />

              {done ? (
                <SuccessScreen
                  plan={selectedPlan}
                  accent={accent}
                  cliente={ctx.cliente}
                  annual={annual}
                  onDone={() => {
                    window.location.href = 'Suscripciones.html';

                />
              ) : (
                <>
                  <Stepper current={step} accent={accent} />

                  <div
                    style={{
                      background: 'var(--card-bg)',
                      border: '1.5px solid var(--border)',
                      borderRadius: '14px',
                      padding: '24px 26px 26px',
                      marginBottom: '14px',
                      boxShadow: '0 1px 4px rgba(0,0,0,0.04)',

                      <h2
                        style={{
                          fontSize: '15.5px',
                          fontWeight: 600,
                          color: 'var(--text)',
                          letterSpacing: '-0.01em',
                        }}
                      >
                        {HEADERS[step][0]}
                      </h2>
                      <p
                        style={{ fontSize: '12.5px', color: 'var(--text-muted)', marginTop: '3px' }}
                      >
                        {HEADERS[step][1]}
                      </p>
                    </div>

                    <div key={animKey} className="step-anim">
                      {step === 0 && (
                        <StepPlan
                          plans={PLANS_RAW}
                          planId={planId}
                          setPlanId={setPlanId}
                          category={category}
                          setCategory={setCategory}
                          annual={annual}
                          setAnnual={setAnnual}
                          accent={accent}
                          currentPlanName={ctx.plan_actual}
                        />
                      )}
                      {step === 1 && <StepPayment card={card} setCard={setCard} accent={accent} />}
                      {step === 2 && selectedPlan && (
                        <StepConfirm
                          plan={selectedPlan}
                          annual={annual}
                          card={card}
                          accent={accent}
                          cliente={ctx.cliente}
                          onEdit={goEdit}
                        />
                      )}
                    </div>
                  </div>

                  {/* Navigation */}
                  <div
                    style={{
                      display: 'flex',
                      justifyContent: 'space-between',
                      alignItems: 'center',
                    }}
                  >
                    <button
                      onClick={back}
                      style={{
                        padding: '9px 16px',
                        borderRadius: '8px',
                        border: '1.5px solid var(--border)',
                        background: 'transparent',
                        color: 'var(--text)',
                        fontSize: '13.5px',
                        fontWeight: 500,
                        cursor: 'pointer',
                        display: 'inline-flex',
                        alignItems: 'center',
                        gap: '7px',
                        transition: 'all 0.15s',

                      <IcoArrowL s={13} />

                        <span style={{ fontSize: '12px', color: 'var(--text-subtle)' }}>
                          Selecciona un plan para continuar
                        </span>
                      )}

                        <span
                          style={{
                            fontSize: '12.5px',
                            color: 'var(--text-muted)',
                            fontVariantNumeric: 'tabular-nums',
                          }}
                        >
                          {selectedPlan.nombre} ·{' '}
                          <strong style={{ color: 'var(--text)' }}>
                            {fmtPrice(
                              Math.round(parseFloat(selectedPlan.precio) * (annual ? 0.9 : 1)),
                            )}
                            /mes
                          </strong>
                        </span>
                      )}
                      {step === 1 && !canNext && (
                        <span style={{ fontSize: '12px', color: 'var(--text-subtle)' }}>
                          Completa los datos de la tarjeta
                        </span>
                      )}
                      {step === 1 && canNext && (
                        <span
                          style={{
                            fontSize: '12.5px',
                            color: 'var(--text-muted)',
                            display: 'inline-flex',
                            alignItems: 'center',
                            gap: '6px',

                          <IcoCheck s={11} /> Tarjeta válida

                        <button
                          onClick={next}

                            padding: '9px 20px',
                            borderRadius: '8px',
                            border: 'none',
                            background: canNext ? accent : 'var(--border)',
                            color: canNext ? '#fff' : 'var(--text-subtle)',
                            fontSize: '13.5px',

                        <button

                          disabled={loading || !selectedPlan}

                            padding: '9px 22px',
                            borderRadius: '8px',

                            color: '#fff',

                            cursor: loading ? 'wait' : 'pointer',

                            alignItems: 'center',
                            gap: '8px',
                            minWidth: '180px',

                            transition: 'all 0.15s',

                          {loading ? (
                            <>
                              <div
                                style={{
                                  width: '13px',
                                  height: '13px',
                                  border: '2px solid rgba(255,255,255,0.3)',
                                  borderTop: '2px solid #fff',
                                  borderRadius: '50%',
                                  animation: 'spin 0.75s linear infinite',
                                }}
                              />
                              Procesando…
                            </>
                          ) : (
                            <>
                              <IcoLock s={13} /> Pagar y activar
                            </>
                          )}
                        </button>
                      )}
                    </div>
                  </div>
                </>
              )}
            </div>

            {TweaksPanel && (
              <TweaksPanel>
                <TweakSection title="Apariencia">
                  <TweakToggle
                    label="Modo oscuro"
                    value={t.dark}
                    onChange={(v) => setTweak('dark', v)}
                  />
                </TweakSection>
                <TweakSection title="Color de acento">
                  <TweakColor
                    value={t.accent}
                    options={ACCENTS}
                    onChange={(v) => setTweak('accent', v)}
                  />
                </TweakSection>
              </TweaksPanel>
            )}
          </div>
        );
      };

      ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
  </body>
</html>
